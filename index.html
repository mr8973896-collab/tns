<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منصة نوادي التنس | تواصل ولعب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* 🚫 إزالة تأثير اللمس الأزرق على الموبايل */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            color: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 🌀 سكرول ناعم جداً بدون تقطيع */
        .app-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px 12px 80px 12px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            scrollbar-width: thin;
            scrollbar-color: rgba(100, 220, 180, 0.4) transparent;
            will-change: transform;
            transform: translateZ(0);
        }

        .app-wrapper::-webkit-scrollbar {
            width: 4px;
        }
        .app-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }
        .app-wrapper::-webkit-scrollbar-thumb {
            background: rgba(100, 220, 180, 0.4);
            border-radius: 10px;
        }

        /* ✨ تصميم Dock شفاف بحواف لامعة رقيقة - ثيم التنس ✨ */
        .bottom-tab-bar {
            position: fixed;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(10, 10, 18, 0.35);
            border-radius: 28px;
            border: 1px solid rgba(100, 220, 180, 0.45);
            box-shadow:
                0 0 0 1px rgba(180, 120, 255, 0.25),
                0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(100, 220, 180, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 16px 14px;
            z-index: 100;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            max-width: 420px;
            margin: 0 auto;
            animation: subtleGlow 4s ease-in-out infinite;
            will-change: transform;
            transform: translateZ(0);
        }

        @keyframes subtleGlow {
            0%, 100% {
                box-shadow:
                    0 0 0 1px rgba(180, 120, 255, 0.25),
                    0 8px 32px rgba(0, 0, 0, 0.5),
                    0 0 20px rgba(100, 220, 180, 0.15),
                    inset 0 1px 0 rgba(255, 255, 255, 0.08);
            }
            50% {
                box-shadow:
                    0 0 0 1px rgba(180, 120, 255, 0.45),
                    0 8px 32px rgba(0, 0, 0, 0.5),
                    0 0 28px rgba(100, 220, 180, 0.28),
                    inset 0 1px 0 rgba(255, 255, 255, 0.15);
            }
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease;
            position: relative;
            padding: 4px;
            border-radius: 16px;
            -webkit-user-select: none;
            user-select: none;
        }
        .tab-item:active {
            transform: scale(0.98);
        }
        .tab-item.active {
            color: #64dcb4;
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            width: 24px;
            height: 3px;
            background: linear-gradient(90deg, #64dcb4, #b478ff);
            border-radius: 3px;
        }
        .tab-icon-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            filter: brightness(0.85) drop-shadow(0 0 3px rgba(100, 220, 180, 0.4));
            transition: filter 0.2s ease, transform 0.2s ease;
            pointer-events: none;
        }
        .tab-item.active .tab-icon-img {
            filter: brightness(1.25) drop-shadow(0 0 10px rgba(100, 220, 180, 0.7));
        }

        .badge-count {
            position: absolute;
            top: -4px;
            right: -6px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 50%;
            min-width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 2px 8px rgba(238, 90, 90, 0.5);
            pointer-events: none;
        }

        /* ✨ بطاقة الإعلان المكتمل - جديدة ✨ */
        .completed-announcement {
            background: linear-gradient(145deg, rgba(30, 50, 45, 0.95), rgba(20, 35, 30, 0.98));
            border-radius: 24px;
            margin: 0 0 20px 0;
            padding: 16px;
            border: 2px solid rgba(100, 220, 180, 0.6);
            position: relative;
            overflow: hidden;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(100, 220, 180, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideDown 0.3s ease-out;
            z-index: 10;
            will-change: transform;
            transform: translateZ(0);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .completed-announcement::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #64dcb4, #b478ff);
            opacity: 0.9;
        }

        .completed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(100, 220, 180, 0.3);
        }

        .completed-title {
            color: #64dcb4;
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .completed-badge {
            background: linear-gradient(135deg, #64dcb4, #4dd0c0);
            color: #0a1a15;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .completed-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #ddd;
        }

        .detail-item strong {
            color: #64dcb4;
            font-weight: 600;
        }

        .completed-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chat-team-btn {
            background: linear-gradient(135deg, #64dcb4 0%, #4dd0c0 100%);
            border: none;
            padding: 10px 18px;
            border-radius: 26px;
            font-weight: 700;
            color: #0a1a15;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            min-width: 110px;
            justify-content: center;
        }
        .chat-team-btn:active {
            transform: scale(0.98);
        }

        .view-details-btn {
            background: rgba(30, 30, 50, 0.8);
            border: 1.5px solid rgba(100, 220, 180, 0.4);
            padding: 10px 18px;
            border-radius: 26px;
            font-weight: 600;
            color: #64dcb4;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            min-width: 110px;
            justify-content: center;
        }
        .view-details-btn:active {
            transform: scale(0.98);
            background: rgba(100, 220, 180, 0.15);
        }

        .players-avatars {
            display: flex;
            gap: -6px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(100, 220, 180, 0.2);
        }

        .player-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #64dcb4, #b478ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #0a1a15;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-left: -6px;
            cursor: pointer;
        }
        .player-avatar:first-child { margin-left: 0; }
        .player-avatar.plus {
            background: rgba(100, 220, 180, 0.2);
            border-color: rgba(100, 220, 180, 0.4);
            color: #64dcb4;
            font-size: 11px;
        }

        /* بطاقات المنشورات العادية */
        .post-card {
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.9), rgba(18, 18, 34, 0.95));
            border-radius: 22px;
            margin-bottom: 16px;
            padding: 18px;
            border: 1px solid rgba(100, 220, 180, 0.2);
            transition: transform 0.2s ease, border-color 0.2s ease;
            position: relative;
            overflow: hidden;
            will-change: transform;
            transform: translateZ(0);
        }
        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, #64dcb4, #b478ff, #64dcb4);
            opacity: 0.7;
        }
        .post-card:active {
            transform: translateY(-2px);
            border-color: rgba(100, 220, 180, 0.45);
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(100, 220, 180, 0.15);
        }
        .club-name {
            color: #64dcb4;
            font-size: 19px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .post-time {
            font-size: 11px;
            color: #888;
            background: rgba(100, 220, 180, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
        }
        .post-detail {
            color: #ddd;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .countdown-section {
            background: rgba(100, 220, 180, 0.12);
            border-radius: 16px;
            padding: 10px 14px;
            margin: 12px 0 8px 0;
            font-size: 13px;
            font-weight: 700;
            color: #64dcb4;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(100, 220, 180, 0.3);
        }

        .ready-btn-new {
            background: linear-gradient(135deg, #64dcb4 0%, #4dd0c0 100%);
            border: none;
            padding: 13px;
            border-radius: 42px;
            font-weight: 700;
            color: #0a1a15;
            width: 100%;
            margin-top: 14px;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-size: 14px;
        }
        .ready-btn-new:active {
            transform: scale(0.98);
        }

        .approved-badge {
            background: linear-gradient(135deg, #64dcb4, #4dd0c0);
            color: #0a1a15;
            padding: 12px;
            border-radius: 42px;
            font-weight: 700;
            text-align: center;
            width: 100%;
            margin-top: 14px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .approved-badge:active {
            transform: scale(0.98);
        }

        .cancel-ready-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border: none;
            padding: 9px;
            border-radius: 32px;
            font-weight: 700;
            color: white;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: transform 0.2s ease;
        }
        .cancel-ready-btn:active {
            transform: scale(0.98);
        }

        .ready-count-badge {
            background: linear-gradient(135deg, rgba(100, 220, 180, 0.2), rgba(180, 120, 255, 0.2));
            color: #64dcb4;
            padding: 5px 14px;
            border-radius: 22px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid rgba(100, 220, 180, 0.35);
        }

        .ready-users-list {
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid rgba(100, 220, 180, 0.15);
        }
        .ready-user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(30, 30, 50, 0.7);
            border-radius: 14px;
            margin-bottom: 10px;
            border: 1px solid rgba(100, 220, 180, 0.1);
        }

        .approve-btn, .reject-btn {
            border: none;
            padding: 7px 14px;
            border-radius: 22px;
            font-weight: 700;
            cursor: pointer;
            margin-left: 8px;
            font-size: 12px;
            transition: transform 0.2s ease;
        }
        .approve-btn {
            background: linear-gradient(135deg, #64dcb4, #4dd0c0);
            color: #0a1a15;
        }
        .reject-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }
        .approve-btn:active, .reject-btn:active {
            transform: scale(0.98);
        }

        .waiting-badge {
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.2), rgba(230, 126, 34, 0.2));
            color: #f39c12;
            padding: 5px 12px;
            border-radius: 22px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(243, 156, 18, 0.35);
        }

        /* Modal Styles - محسّنة للشاشات الكبيرة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 16, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.98), rgba(18, 18, 34, 0.98));
            width: 92%;
            max-width: 450px;
            border-radius: 30px;
            padding: 24px 20px;
            border: 1px solid rgba(100, 220, 180, 0.35);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(180, 120, 255, 0.2),
                0 0 40px rgba(100, 220, 180, 0.15);
            animation: slideUp 0.25s ease;
            max-height: 85vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(100, 220, 180, 0.4) transparent;
        }
        .modal-content::-webkit-scrollbar {
            width: 4px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: rgba(100, 220, 180, 0.4);
            border-radius: 10px;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 🖥️ تحسين المودال للشاشات الكبيرة */
        @media (min-width: 768px) {
            .modal-content {
                max-width: 420px;
                max-height: 70vh;
                padding: 20px 18px;
                margin: auto;
            }
            .completed-announcement {
                max-width: 600px;
                margin: 0 auto 20px auto;
            }
            .bottom-tab-bar {
                max-width: 500px;
            }
        }

        @media (min-width: 1024px) {
            .modal-content {
                max-height: 65vh;
                max-width: 400px;
            }
        }

        .chat-modal-content {
            height: 85vh;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }
        @media (min-width: 768px) {
            .chat-modal-content {
                height: 75vh;
                max-width: 480px;
            }
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 12px 4px;
            scrollbar-width: thin;
            scrollbar-color: rgba(100, 220, 180, 0.4) transparent;
            -webkit-overflow-scrolling: touch;
        }
        .messages-container::-webkit-scrollbar {
            width: 4px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(100, 220, 180, 0.4);
            border-radius: 10px;
        }
        .message {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 14px;
            word-wrap: break-word;
            position: relative;
            line-height: 1.4;
        }
        .my-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #64dcb4, #4dd0c0);
            color: #0a1a15;
            border-bottom-right-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .other-message {
            align-self: flex-start;
            background: rgba(38, 38, 58, 0.9);
            color: #efefef;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(100, 220, 180, 0.15);
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 26px;
            padding: 20px;
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.7), rgba(18, 18, 34, 0.8));
            border-radius: 26px;
            border: 1px solid rgba(100, 220, 180, 0.2);
        }
        .avatar {
            background: linear-gradient(135deg, #64dcb4 0%, #b478ff 50%, #64dcb4 100%);
            width: 84px;
            height: 84px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #0a1a15;
            border: 3px solid rgba(255, 255, 255, 0.25);
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            background: rgba(30, 30, 50, 0.7);
            border-radius: 30px;
            padding: 14px;
            margin: 18px 0;
            border: 1px solid rgba(100, 220, 180, 0.15);
        }
        .stat {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease;
            padding: 10px;
            border-radius: 18px;
        }
        .stat:active {
            transform: scale(0.98);
        }
        .stat-number {
            font-size: 22px;
            font-weight: 700;
            color: #64dcb4;
        }

        .btn-primary {
            background: linear-gradient(135deg, #64dcb4 0%, #4dd0c0 100%);
            border: none;
            padding: 14px;
            border-radius: 44px;
            font-weight: 700;
            color: #0a1a15;
            width: 100%;
            margin-top: 14px;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-size: 15px;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #64dcb4;
            color: #64dcb4;
            padding: 12px;
            border-radius: 44px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-outline:active {
            transform: scale(0.98);
            background: rgba(100, 220, 180, 0.12);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            padding: 12px;
            border-radius: 44px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s ease;
        }
        .btn-danger:active {
            transform: scale(0.98);
        }

        input, textarea, select {
            background: rgba(30, 30, 50, 0.8);
            border: 1.5px solid rgba(100, 220, 180, 0.25);
            padding: 14px 18px;
            border-radius: 24px;
            color: white;
            width: 100%;
            margin-bottom: 14px;
            font-size: 14px;
            transition: border-color 0.2s ease, background 0.2s ease;
            -webkit-appearance: none;
            appearance: none;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #64dcb4;
            background: rgba(35, 35, 58, 0.95);
        }
        input::placeholder, textarea::placeholder {
            color: #777;
        }

        .empty-state {
            text-align: center;
            color: #777;
            padding: 40px 20px;
            background: rgba(30, 30, 50, 0.4);
            border-radius: 24px;
            border: 1px dashed rgba(100, 220, 180, 0.2);
        }
        .empty-state span {
            color: #64dcb4;
            font-weight: 600;
        }

        .toast-message {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #64dcb4, #4dd0c0);
            color: #0a1a15;
            padding: 14px 28px;
            border-radius: 44px;
            font-weight: 700;
            z-index: 1100;
            animation: toastIn 0.25s ease, toastOut 0.25s ease 2s forwards;
            box-shadow: 0 6px 25px rgba(100, 220, 180, 0.5);
            pointer-events: none;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(15px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
            to { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.98); visibility: hidden; }
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .small-btn {
            padding: 9px 18px;
            font-size: 12px;
            border-radius: 28px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        .small-btn:active {
            transform: scale(0.98);
        }

        .select-item {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            padding: 10px;
            border-radius: 16px;
            transition: background 0.2s ease;
            margin-bottom: 8px;
        }
        .select-item:active {
            background: rgba(30, 30, 50, 0.7);
        }

        .select-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #64dcb4;
            border: 2px solid rgba(100, 220, 180, 0.4);
            border-radius: 6px;
        }

        .delete-selected-btn, .select-all-btn {
            border: none;
            padding: 9px 18px;
            border-radius: 28px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-right: 10px;
            transition: transform 0.2s ease;
        }
        .delete-selected-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }
        .select-all-btn {
            background: linear-gradient(135deg, #5dade2, #3498db);
        }
        .delete-selected-btn:active, .select-all-btn:active {
            transform: scale(0.98);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        ::selection {
            background: rgba(100, 220, 180, 0.35);
            color: white;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(100, 220, 180, 0.3);
            border-radius: 50%;
            border-top-color: #64dcb4;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .bottom-tab-bar {
                bottom: 10px;
                left: 10px;
                right: 10px;
                padding: 8px 12px 12px;
            }
            .tab-icon-img {
                width: 26px;
                height: 26px;
            }
            .post-card {
                padding: 14px;
                border-radius: 20px;
            }
            .modal-content {
                width: 95%;
                padding: 20px 16px;
                border-radius: 26px;
                max-height: 88vh;
            }
            .completed-announcement {
                padding: 14px;
                margin: 0 0 16px 0;
            }
            .completed-details {
                grid-template-columns: 1fr;
            }
            .completed-actions {
                flex-direction: column;
            }
            .chat-team-btn, .view-details-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="appContainer"></div>

<!-- 🎾 شريط التنقل السفلي - تصميم شفاف بحواف لامعة 🎾 -->
<div class="bottom-tab-bar" id="tabBar" style="display: none;">
    <button class="tab-item" data-tab="home" title="الرئيسية">
        <img src="hom.png" class="tab-icon-img" alt="🏠" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%2364dcb4%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z%22/%3E%3C/svg%3E'">
    </button>
    <button class="tab-item" data-tab="chats" id="chatsTab" title="الدردشات">
        <div style="position: relative;">
            <img src="chat.png" class="tab-icon-img" alt="💬" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%2364dcb4%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z%22/%3E%3C/svg%3E'">
            <span id="chatsBadge" class="badge-count" style="display:none;">0</span>
        </div>
    </button>
    <button class="tab-item" data-tab="notifications" id="notificationsTab" title="الإشعارات">
        <div style="position: relative;">
            <img src="not.png" class="tab-icon-img" alt="🔔" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%2364dcb4%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.93 6 11v5l-2 2v1h16v-1l-2-2z%22/%3E%3C/svg%3E'">
            <span id="notifBadge" class="badge-count" style="display:none;">0</span>
        </div>
    </button>
    <button class="tab-item" data-tab="profile" title="الملف الشخصي">
        <img src="pro.png" class="tab-icon-img" alt="👤" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%2364dcb4%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z%22/%3E%3C/svg%3E'">
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, get, push, onValue, child, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBT-WCUAI7QO2IlcF3eQlJOSrTOQN_52vU",
        authDomain: "pcon-f6efd.firebaseapp.com",
        databaseURL: "https://pcon-f6efd-default-rtdb.firebaseio.com",
        projectId: "pcon-f6efd",
        storageBucket: "pcon-f6efd.firebasestorage.app",
        messagingSenderId: "971596240948",
        appId: "1:971596240948:web:9abf2f64a84be34521d261"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUser = null;
    let currentUserId = null;
    let activeTab = "home";
    let unreadNotificationsCount = 0;
    let unreadMessagesCount = 0;
    let notificationListener = null;
    let chatsListener = null;
    let countdownInterval = null;
    let completedAnnouncementsListener = null;

    function getLevelValue(level) {
        if (!level) return 0;
        const levelMap = { 'مبتدئ': 1, 'أقل من متوسط': 2, 'متوسط': 3, 'أعلى من متوسط': 4, 'محترف': 5 };
        return levelMap[level] || 0;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function showToast(msg) {
        const existing = document.querySelector('.toast-message');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2200);
    }

    function showTabBar() { document.getElementById("tabBar").style.display = "flex"; }
    function hideTabBar() { document.getElementById("tabBar").style.display = "none"; }

    function updateNotificationsBadge() {
        const badge = document.getElementById('notifBadge');
        if (unreadNotificationsCount > 0) {
            badge.textContent = unreadNotificationsCount > 99 ? '99+' : unreadNotificationsCount;
            badge.style.display = 'flex';
        } else { badge.style.display = 'none'; }
    }

    function updateChatsBadge() {
        const badge = document.getElementById('chatsBadge');
        if (unreadMessagesCount > 0) {
            badge.textContent = unreadMessagesCount > 99 ? '99+' : unreadMessagesCount;
            badge.style.display = 'flex';
        } else { badge.style.display = 'none'; }
    }

    function loadUnreadNotificationsCount() {
        if (!currentUserId) return;
        if (notificationListener) notificationListener();
        notificationListener = onValue(ref(db, `notifications/${currentUserId}`), (snapshot) => {
            const notifs = snapshot.val() || {};
            let count = 0;
            Object.values(notifs).forEach(notif => { if (!notif.read) count++; });
            unreadNotificationsCount = count;
            updateNotificationsBadge();
        });
    }

    function loadUnreadMessagesCount() {
        if (!currentUserId) return;
        if (chatsListener) chatsListener();
        chatsListener = onValue(ref(db, `userChats/${currentUserId}`), async (snapshot) => {
            const entries = snapshot.val() || {};
            let totalUnread = 0;
            for (const [chatId, chatData] of Object.entries(entries)) {
                const lastReadSnap = await get(ref(db, `userChats/${currentUserId}/${chatId}/lastRead`));
                const lastRead = lastReadSnap.val() || 0;
                const messagesSnap = await get(ref(db, `chats/${chatId}/messages`));
                const messages = messagesSnap.val() || {};
                Object.values(messages).forEach(msg => {
                    if (msg.senderId !== currentUserId && msg.timestamp > lastRead) totalUnread++;
                });
            }
            unreadMessagesCount = totalUnread;
            updateChatsBadge();
        });
    }

    async function updateLastRead(chatId) {
        await set(ref(db, `userChats/${currentUserId}/${chatId}/lastRead`), Date.now());
        loadUnreadMessagesCount();
    }

    async function markAllNotificationsAsRead() {
        if (!currentUserId) return;
        const notifsRef = ref(db, `notifications/${currentUserId}`);
        const snapshot = await get(notifsRef);
        const notifs = snapshot.val() || {};
        const updates = {};
        Object.keys(notifs).forEach(id => { if (!notifs[id].read) updates[`notifications/${currentUserId}/${id}/read`] = true; });
        if (Object.keys(updates).length > 0) await update(ref(db), updates);
    }

    function updateAllCountdowns() {
        const now = Date.now();
        document.querySelectorAll('.post-card').forEach(card => {
            const countdownSection = card.querySelector('.countdown-section');
            if (!countdownSection) return;
            const eventTs = parseInt(countdownSection.dataset.eventTimestamp);
            if (!eventTs) return;
            const diff = eventTs - now;
            if (diff < 7200000) { card.style.display = 'none'; return; }
            else { card.style.display = ''; }
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const timeSpan = countdownSection.querySelector('.time-remaining');
            if (timeSpan) timeSpan.textContent = `${hours} ساعة و ${minutes} دقيقة`;
        });
    }

    function showLogoutConfirmModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-content" style="max-width:380px; text-align:center; padding:30px 22px;">
            <div style="font-size:48px; margin-bottom:18px;">🚪</div>
            <h3 style="color:#64dcb4; margin-bottom:12px; font-size:20px;">تسجيل الخروج؟</h3>
            <p style="color:#aaa; margin-bottom:28px; font-size:14px;">سيتم مسح بيانات الدخول</p>
            <div style="display:flex; gap:14px;">
                <button id="cancelLogoutBtn" class="btn-outline" style="flex:1; padding:14px;">إلغاء</button>
                <button id="confirmLogoutBtn" class="btn-danger" style="flex:1; padding:14px;">خروج</button>
            </div></div>`;
        document.body.appendChild(modal);
        document.getElementById("cancelLogoutBtn").addEventListener("click", () => modal.remove());
        document.getElementById("confirmLogoutBtn").addEventListener("click", () => { modal.remove(); logout(); });
    }

    function showEditProfileModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-content">
            <h3 style="margin-bottom:22px; color:#64dcb4; text-align:center;">✏️ تعديل البيانات</h3>
            <input type="text" id="editName" value="${escapeHtml(currentUser.name)}" placeholder="الاسم" style="text-align:center;">
            <input type="number" id="editAge" value="${currentUser.age}" placeholder="العمر" style="text-align:center;">
            <input type="tel" id="editPhone" value="${currentUser.phone}" placeholder="الموبايل" style="text-align:center;">
            <select id="editTennisLevel" style="text-align:center;">
                <option value="مبتدئ" ${currentUser.tennisLevel==='مبتدئ'?'selected':''}>مبتدئ</option>
                <option value="أقل من متوسط" ${currentUser.tennisLevel==='أقل من متوسط'?'selected':''}>أقل من متوسط</option>
                <option value="متوسط" ${currentUser.tennisLevel==='متوسط'?'selected':''}>متوسط</option>
                <option value="أعلى من متوسط" ${currentUser.tennisLevel==='أعلى من متوسط'?'selected':''}>أعلى من متوسط</option>
                <option value="محترف" ${currentUser.tennisLevel==='محترف'?'selected':''}>محترف</option>
            </select>
            <div style="display:flex; gap:12px; margin-top:20px;">
                <button id="cancelEditBtn" class="btn-outline" style="flex:1;">إلغاء</button>
                <button id="saveEditBtn" class="btn-primary" style="flex:1;">💾 حفظ</button>
            </div></div>`;
        document.body.appendChild(modal);
        document.getElementById("cancelEditBtn").addEventListener("click", () => modal.remove());
        document.getElementById("saveEditBtn").addEventListener("click", async () => {
            const newName = document.getElementById("editName").value.trim();
            const newAge = document.getElementById("editAge").value.trim();
            const newPhone = document.getElementById("editPhone").value.trim();
            const newLevel = document.getElementById("editTennisLevel").value;
            if (!newName || !newAge || !newPhone || !newLevel) { alert("❌ املأ جميع الحقول"); return; }
            if (isNaN(newAge) || newAge < 1) { alert("❌ عمر غير صحيح"); return; }
            await update(ref(db, `users/${currentUserId}`), { name: newName, age: newAge, phone: newPhone, tennisLevel: newLevel });
            currentUser.name = newName; currentUser.age = newAge; currentUser.phone = newPhone; currentUser.tennisLevel = newLevel;
            localStorage.setItem('tennisApp_user', JSON.stringify(currentUser));
            showToast("✅ تم الحفظ"); modal.remove(); renderProfileTab();
        });
    }

    function showRegisterCard() {
        hideTabBar();
        document.getElementById("appContainer").innerHTML = `<div style="display:flex; justify-content:center; align-items:center; min-height:80vh; padding:20px;">
            <div style="background:linear-gradient(145deg, rgba(26,26,46,0.95), rgba(18,18,34,0.98)); border-radius:32px; padding:32px 26px; width:100%; max-width:400px; border:1.5px solid rgba(100,220,180,0.4);">
                <div style="text-align:center; margin-bottom:22px;">
                    <div style="font-size:44px; margin-bottom:10px;">🎾</div>
                    <h2 style="color:#64dcb4; font-size:22px;">منصة التنس</h2>
                    <p style="color:#aaa; margin-top:6px; font-size:13px;">سجل للعب مع اللاعبين</p>
                </div>
                <input type="text" id="userName" placeholder="الاسم" style="text-align:center;">
                <input type="number" id="userAge" placeholder="العمر" style="text-align:center;">
                <input type="tel" id="userPhone" placeholder="الموبايل" style="text-align:center;">
                <select id="userTennisLevel" style="text-align:center;">
                    <option value="">مستواك</option>
                    <option value="مبتدئ">مبتدئ</option><option value="أقل من متوسط">أقل من متوسط</option>
                    <option value="متوسط">متوسط</option><option value="أعلى من متوسط">أعلى من متوسط</option><option value="محترف">محترف</option>
                </select>
                <button id="registerBtn" class="btn-primary">✨ ابدأ</button>
                <p style="text-align:center; color:#666; font-size:11px; margin-top:14px;">بالضغط توافق على الشروط</p>
            </div></div>`;
        document.getElementById("registerBtn").addEventListener("click", async () => {
            const name = document.getElementById("userName").value.trim();
            const age = document.getElementById("userAge").value.trim();
            const phone = document.getElementById("userPhone").value.trim();
            const tennisLevel = document.getElementById("userTennisLevel").value;
            if (!name || !age || !phone || !tennisLevel) return alert("❌ املأ جميع الحقول");
            if (isNaN(age) || age < 1) return alert("❌ عمر غير صحيح");
            const newUserRef = push(ref(db, "users"));
            currentUserId = newUserRef.key;
            currentUser = { id: currentUserId, name, age, phone, tennisLevel, registeredAt: new Date().toISOString() };
            await set(newUserRef, currentUser);
            localStorage.setItem('tennisApp_userId', currentUserId);
            localStorage.setItem('tennisApp_user', JSON.stringify(currentUser));
            showMainApp();
        });
    }

    function showMainApp() {
        if (!currentUser) return;
        currentUserId = currentUser.id;
        showTabBar();
        loadUnreadNotificationsCount();
        loadUnreadMessagesCount();
        renderCurrentTab();
    }

    function renderCurrentTab() {
        if (activeTab === "home") renderHomeTab();
        else if (activeTab === "chats") { renderChatsTab(); setTimeout(() => loadUnreadMessagesCount(), 500); }
        else if (activeTab === "notifications") { renderNotificationsTab(); markAllNotificationsAsRead(); }
        else if (activeTab === "profile") renderProfileTab();
        document.querySelectorAll('.tab-item').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === activeTab);
        });
    }

    function renderHomeTab() {
        const container = document.getElementById("appContainer");
        container.innerHTML = `<div id="completedAnnouncementsContainer"></div>
            <div style="margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
                <h2 style="color:#64dcb4; display:flex; align-items:center; gap:6px; font-size:20px;"><span>🎾</span> نوادي التنس</h2>
                <button id="globalAddPostBtn" style="background:linear-gradient(135deg, #64dcb4, #4dd0c0); border:none; padding:9px 20px; border-radius:30px; font-weight:700; color:#0a1a15; display:flex; align-items:center; gap:4px; font-size:13px;">
                    <span style="font-size:16px;">+</span> منشور
                </button>
            </div><div id="postsList"></div>`;
        document.getElementById("globalAddPostBtn").addEventListener("click", openAddPostModal);
        loadAllPostsForHome();
        loadCompletedAnnouncements();
        if (!countdownInterval) countdownInterval = setInterval(updateAllCountdowns, 60000);
        setTimeout(updateAllCountdowns, 300);
    }

    function loadCompletedAnnouncements() {
        if (!currentUserId) return;
        if (completedAnnouncementsListener) completedAnnouncementsListener();
        completedAnnouncementsListener = onValue(ref(db, "completedPosts"), (snapshot) => {
            const completed = snapshot.val() || {};
            const container = document.getElementById("completedAnnouncementsContainer");
            const userCompleted = Object.entries(completed)
                .filter(([id, data]) => data.publisherId === currentUserId || (data.approvedPlayers && data.approvedPlayers.includes(currentUserId)))
                .filter(([id, data]) => { const completedAt = data.completedAt || data.timestamp; return Date.now() - completedAt < 24 * 60 * 60 * 1000; })
                .reverse();
            if (userCompleted.length === 0) { container.innerHTML = ''; return; }
            let html = '';
            userCompleted.forEach(([id, post]) => {
                const eventDate = new Date(post.eventTimestamp);
                const formattedEvent = `${eventDate.toLocaleDateString('ar-EG', {weekday:'short', day:'numeric', month:'long'})} - ${eventDate.toLocaleTimeString('ar-EG', {hour:'numeric', minute:'2-digit'})}`;
                const approvedNames = post.approvedNames || [];
                const avatarsHtml = approvedNames.slice(0, 4).map(name => `<div class="player-avatar" title="${escapeHtml(name)}">${name.charAt(0)}</div>`).join('');
                const extraHtml = approvedNames.length > 4 ? `<div class="player-avatar plus">+${approvedNames.length-4}</div>` : '';
                html += `<div class="completed-announcement" data-post-id="${id}">
                    <div class="completed-header"><div class="completed-title">فريق مكتمل 🎾</div><div class="completed-badge">✅ جاهز</div></div>
                    <div class="completed-details">
                        <div class="detail-item"><strong>🏟️</strong> ${escapeHtml(post.clubName)}</div>
                        <div class="detail-item"><strong>📍</strong> ${escapeHtml(post.location||'غير محدد')}</div>
                        <div class="detail-item"><strong>🕐</strong> ${formattedEvent}</div>
                        <div class="detail-item"><strong>👥</strong> ${approvedNames.length}/${post.neededPlayers}</div>
                        <div class="detail-item"><strong>🎯</strong> ${escapeHtml(post.preferredLevel||'غير محدد')}</div>
                    </div>
                    <div class="players-avatars">${avatarsHtml}${extraHtml}</div>
                    <div class="completed-actions">
                        <button class="chat-team-btn" data-chat-id="${post.teamChatId}">💬 الفريق</button>
                        <button class="view-details-btn" data-post-id="${id}">📋 التفاصيل</button>
                    </div></div>`;
            });
            container.innerHTML = html;
            document.querySelectorAll('.chat-team-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const chatId = e.currentTarget.dataset.chatId;
                    if (chatId) window.switchToTabAndOpenChat('chats', chatId);
                    else showToast("⚠️ لا توجد دردشة");
                });
            });
            document.querySelectorAll('.view-details-btn').forEach(btn => {
                btn.addEventListener('click', (e) => showCompletedPostDetails(e.currentTarget.dataset.postId));
            });
        });
    }

    function showCompletedPostDetails(postId) {
        get(ref(db, `completedPosts/${postId}`)).then((snapshot) => {
            if (!snapshot.exists()) { showToast("⚠️ غير موجود"); return; }
            const post = snapshot.val();
            const eventDate = new Date(post.eventTimestamp);
            const formattedEvent = `${eventDate.toLocaleDateString('ar-EG', {weekday:'long', day:'numeric', month:'long', year:'numeric'})} - ${eventDate.toLocaleTimeString('ar-EG', {hour:'numeric', minute:'2-digit'})}`;
            const modal = document.createElement("div");
            modal.className = "modal";
            modal.style.display = "flex";
            modal.innerHTML = `<div class="modal-content">
                <div style="display:flex; justify-content:space-between; margin-bottom:16px; align-items:center;">
                    <h3 style="color:#64dcb4; font-size:18px;">📋 التفاصيل</h3>
                    <button onclick="this.closest('.modal').remove()" style="background:none; border:none; font-size:26px; color:#ff6b6b; cursor:pointer;">✕</button>
                </div>
                <div style="background:rgba(30,50,45,0.6); border-radius:18px; padding:16px; border:1px solid rgba(100,220,180,0.3);">
                    <div style="display:grid; gap:12px;">

    function loadAllPostsForHome() {
        onValue(ref(db, "allPosts"), (snapshot) => {
            const posts = snapshot.val() || {};
            let postsArray = Object.entries(posts).map(([id, data]) => ({ id, ...data }))
                .filter(post => !post.completed && post.eventTimestamp && post.eventTimestamp > Date.now()).reverse();
            let html = '';
            if (postsArray.length === 0) html = `<div class="empty-state">🎾 لا توجد مباريات<br><span>✏️ أضف موعداً!</span></div>`;
            else postsArray.forEach(post => {
                const eventDate = new Date(post.eventTimestamp);
                const formattedEvent = `${eventDate.toLocaleDateString('ar-EG', {weekday:'short', day:'numeric', month:'long'})} - ${eventDate.toLocaleTimeString('ar-EG', {hour:'numeric', minute:'2-digit'})}`;
                html += `<div class="post-card" id="post-${post.id}">
                    <div class="post-header"><span class="club-name">🎾 ${escapeHtml(post.clubName)}</span><span class="post-time">${formattedEvent}</span></div>
                    <div class="post-detail">🕐 ${escapeHtml(post.time)}</div>
                    <div class="post-detail">📍 ${escapeHtml(post.location||'غير محدد')}</div>
                    <div class="post-detail">👥 يحتاج ${post.neededPlayers||'؟'} لاعب • ${escapeHtml(post.preferredLevel||'غير محدد')}</div>
                    <div class="post-detail">👤 ${escapeHtml(post.publisherName)}</div>
                    <div class="countdown-section" data-event-timestamp="${post.eventTimestamp}">⏳ <span class="time-remaining"></span> • 👥 <span class="remaining-spots">${Math.max(0, (post.neededPlayers||9999))}</span> مكان</div>
                    <div class="ready-section"></div></div>`;
            });
            document.getElementById("postsList").innerHTML = html;
            postsArray.forEach(post => {
                const isOwner = post.publisherId === currentUserId;
                const readyRef = ref(db, `postReady/${post.id}`);
                onValue(readyRef, (readySnap) => {
                    const readyUsers = readySnap.val() || {};
                    const approvedCount = Object.values(readyUsers).filter(u => u.status === 'approved').length;
                    const needed = post.neededPlayers || 9999;
                    const remaining = Math.max(0, needed - approvedCount);
                    const isUserReady = readyUsers[currentUserId] !== undefined;
                    const isUserApproved = readyUsers[currentUserId]?.status === 'approved';
                    const postElement = document.getElementById(`post-${post.id}`);
                    if (!postElement) return;
                    const readyDiv = postElement.querySelector('.ready-section');
                    const countdownSection = postElement.querySelector('.countdown-section');
                    if (countdownSection) {
                        countdownSection.querySelector('.time-remaining').textContent = countdownSection.dataset.eventTimestamp ? 
                            `${Math.floor((parseInt(countdownSection.dataset.eventTimestamp)-Date.now())/(1000*60*60))}س ${Math.floor(((parseInt(countdownSection.dataset.eventTimestamp)-Date.now())%(1000*60*60))/(1000*60))}د` : '';
                        countdownSection.querySelector('.remaining-spots').textContent = remaining;
                    }
                    if (!readyDiv) return;
                    if (isOwner) {
                        let usersHtml = '';
                        Object.entries(readyUsers).forEach(([userId, userData]) => {
                            if (userData.status === 'waiting') usersHtml += `<div class="ready-user-item"><span>🎾 ${escapeHtml(userData.name)}</span><div>
                                <button class="approve-btn" data-userid="${userId}" data-username="${escapeHtml(userData.name)}" data-postid="${post.id}" data-postclub="${escapeHtml(post.clubName)}" data-posttime="${escapeHtml(post.time)}">✅</button>
                                <button class="reject-btn" data-userid="${userId}" data-postid="${post.id}">❌</button></div></div>`;
                        });
                        readyDiv.innerHTML = `<div class="ready-count-badge">👥 ${approvedCount}/${needed===9999?'∞':needed} • ${Object.keys(readyUsers).length} طلب</div>${usersHtml ? `<div class="ready-users-list">${usersHtml}</div>` : '<div class="ready-users-list" style="color:#777; text-align:center; padding:10px;">لا يوجد طلبات</div>'}`;
                        readyDiv.querySelectorAll('.approve-btn').forEach(btn => btn.addEventListener('click', () => approveUser(btn.dataset.userid, btn.dataset.username, btn.dataset.postid, btn.dataset.postclub, btn.dataset.posttime)));
                        readyDiv.querySelectorAll('.reject-btn').forEach(btn => btn.addEventListener('click', () => rejectUser(btn.dataset.userid, btn.dataset.postid)));
                    } else {
                        let readyContent = `<div class="ready-count-badge">👥 ${approvedCount}/${needed===9999?'∞':needed} • باقي ${remaining}</div>`;
                        if (isUserApproved) {
                            const chatId = [currentUserId, post.publisherId].sort().join('_');
                            readyContent += `<div style="margin-top:6px; padding:10px; background:linear-gradient(135deg,#64dcb4,#4dd0c0); color:#0a1a15; border-radius:20px; text-align:center; font-weight:700; font-size:13px;">✅ تمت الموافقة</div>
                                <button class="approved-badge" onclick="window.switchToTabAndOpenChat('chats', '${chatId}')" style="padding:10px; font-size:13px;">💬 دردشة</button>
                                <button class="cancel-ready-btn" data-postid="${post.id}" style="margin-top:6px; padding:8px; font-size:12px;">❌ سحب</button>`;
                        } else if (isUserReady) {
                            readyContent += `<button class="cancel-ready-btn" data-postid="${post.id}" style="margin-top:6px; padding:8px; font-size:12px;">❌ سحب</button><div class="waiting-badge" style="text-align:center; margin-top:8px; padding:6px 10px; font-size:10px;">⏳ في الانتظار</div>`;
                        } else {
                            if (remaining > 0) readyContent += `<button class="ready-btn-new" data-post-id="${post.id}" data-post-club="${escapeHtml(post.clubName)}" data-post-time="${escapeHtml(post.time)}" data-post-publisher="${escapeHtml(post.publisherName)}" data-post-publisherid="${post.publisherId}" data-post-preferredlevel="${escapeHtml(post.preferredLevel||'')}" style="padding:11px; font-size:13px;">🎾 جاهز للعب</button>`;
                            else readyContent += `<div class="waiting-badge" style="text-align:center; padding:12px; font-size:13px;">🎉 اكتمل التيم</div>`;
                        }
                        readyDiv.innerHTML = readyContent;
                        const readyBtn = readyDiv.querySelector('.ready-btn-new');
                        if (readyBtn) readyBtn.addEventListener('click', (e) => handleReadyClick(e, post.id, post.clubName, post.time, post.publisherName, post.publisherId, e.currentTarget.dataset.postPreferredlevel||''));
                        const cancelBtn = readyDiv.querySelector('.cancel-ready-btn');
                        if (cancelBtn) cancelBtn.addEventListener('click', () => cancelReady(post.id));
                    }
                });
            });
        });
    }

    async function handleReadyClick(e, postId, clubName, eventTime, publisherName, publisherId, preferredLevel = '') {
        if (publisherId === currentUserId) { showToast("لا يمكنك التجهيز على منشورك"); return; }
        const userLevelVal = getLevelValue(currentUser.tennisLevel);
        const requiredLevelVal = getLevelValue(preferredLevel);
        if (requiredLevelVal > 0 && userLevelVal < requiredLevelVal) { showToast(`مستواك أقل من المطلوب (${preferredLevel})`); return; }
        await set(ref(db, `postReady/${postId}/${currentUserId}`), { name: currentUser.name, userId: currentUserId, status: 'waiting', timestamp: Date.now() });
        await push(ref(db, `notifications/${publisherId}`), { type: 'new_ready', fromName: currentUser.name, fromId: currentUserId, clubName, postId, message: `🔔 ${currentUser.name} جاهز للعب في ${clubName}`, timestamp: Date.now(), read: false });
        showToast(`✅ تم الإرسال إلى ${publisherName}`);
    }

    async function cancelReady(postId) {
        await remove(ref(db, `postReady/${postId}/${currentUserId}`));
        try {
            const postSnap = await get(ref(db, `allPosts/${postId}`));
            if (postSnap.exists()) {
                const post = postSnap.val();
                await push(ref(db, `notifications/${post.publisherId}`), { type: 'withdraw', fromName: currentUser.name, message: `😔 ${currentUser.name} سحب طلبه من ${post.clubName}`, timestamp: Date.now(), read: false });
                if (post.completed) {
                    const readySnap = await get(ref(db, `postReady/${postId}`));
                    const rUsers = readySnap.val() || {};
                    const approvedC = Object.values(rUsers).filter(u => u.status === 'approved').length;
                    if (approvedC < (post.neededPlayers||9999)) await update(ref(db, `allPosts/${postId}`), { completed: false });
                }
            }
        } catch(e) {}
        showToast("❌ تم السحب");
    }

    async function approveUser(userId, userName, postId, clubName, eventTime) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-content"><h3 style="color:#64dcb4; margin-bottom:16px; text-align:center;">✉️ إرسال رسالة</h3>
            <div style="background:rgba(15,25,22,0.8); padding:12px; border-radius:12px; margin-bottom:18px; font-size:13px; line-height:1.4;">🎉 أهلاً ${escapeHtml(userName)}!<br>✅ الموعد تمام 🤝 ${escapeHtml(clubName)}</div>
            <div style="display:flex; gap:12px;"><button id="cancelSendBtn" class="btn-outline" style="flex:1; padding:12px;">إلغاء</button><button id="confirmSendBtn" class="btn-primary" style="flex:1; padding:12px;">📤 إرسال</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("cancelSendBtn").addEventListener("click", () => modal.remove());
        document.getElementById("confirmSendBtn").addEventListener("click", async () => {
            modal.remove();
            await update(ref(db), { [`postReady/${postId}/${userId}/status`]: 'approved' });
            const chatId = [currentUserId, userId].sort().join('_');
            await set(ref(db, `chats/${chatId}`), { participants: [currentUserId, userId], participantNames: { [currentUserId]: currentUser.name, [userId]: userName }, createdAt: Date.now(), clubName, postId, eventTime });
            await set(ref(db, `userChats/${currentUserId}/${chatId}`), { chatId, otherId: userId, otherName: userName, clubName, lastUpdated: Date.now(), lastRead: Date.now() });
            await set(ref(db, `userChats/${userId}/${chatId}`), { chatId, otherId: currentUserId, otherName: currentUser.name, clubName, lastUpdated: Date.now(), lastRead: 0 });
            const msgRef = push(ref(db, `chats/${chatId}/messages`));
            await set(msgRef, { senderId: currentUserId, senderName: currentUser.name, text: `🎉 أهلاً ${userName}!\n✅ الموعد تمام 🤝 ${clubName}`, timestamp: Date.now() });
            await push(ref(db, `notifications/${userId}`), { type: 'approved', fromName: currentUser.name, chatId, message: `🎉 ${currentUser.name} وافق! اذهب للدردشة`, timestamp: Date.now(), read: false });
            const readySnap = await get(ref(db, `postReady/${postId}`));
            const rUsers = readySnap.val() || {};
            const approvedUsers = Object.values(rUsers).filter(u => u.status === 'approved');
            const postSnap = await get(ref(db, `allPosts/${postId}`));
            if (postSnap.exists()) {
                const post = postSnap.val();
                const needed = post.neededPlayers || 9999;
                if (approvedUsers.length >= needed) {
                    const teamChatId = `team_${postId}`;
                    const approvedNames = approvedUsers.map(u => u.name);
                    const allParticipants = [post.publisherId, ...approvedUsers.map(u => u.userId)];
                    await set(ref(db, `completedPosts/${postId}`), { ...post, completedAt: Date.now(), approvedPlayers: approvedUsers.map(u => u.userId), approvedNames, teamChatId });
                    await set(ref(db, `chats/${teamChatId}`), { participants: allParticipants, participantNames: { [post.publisherId]: post.publisherName, ...Object.fromEntries(approvedUsers.map(u => [u.userId, u.name])) }, createdAt: Date.now(), clubName, postId, eventTime: post.time, isTeamChat: true });
                    for (const participantId of allParticipants) await set(ref(db, `userChats/${participantId}/${teamChatId}`), { chatId: teamChatId, otherName: "فريق التنس", clubName, lastUpdated: Date.now(), lastRead: Date.now(), isTeamChat: true });
                    const welcomeRef = push(ref(db, `chats/${teamChatId}/messages`));
                    await set(welcomeRef, { senderId: 'system', senderName: 'النظام', text: `🎉 أهلاً بالفريق! 🎾\nالموعد: ${post.time}\nالمكان: ${post.location||post.clubName}\nلنلعب مباراة رائعة! 💪`, timestamp: Date.now(), isSystem: true });
                    for (const participantId of allParticipants) await push(ref(db, `notifications/${participantId}`), { type: 'team_complete', message: `🎉 اكتمل فريق ${post.clubName}! الموعد: ${post.time}`, chatId: teamChatId, timestamp: Date.now(), read: false });
                    await update(ref(db, `allPosts/${postId}`), { completed: true, completedAt: Date.now(), teamChatId });
                    showToast("🎉 اكتمل التيم! ظهر الإعلان");
                }
            }
            showToast(`✅ تمت الموافقة على ${userName}`);
            setTimeout(() => window.openChat(chatId), 400);
        });
    }

    async function rejectUser(userId, postId) {
        await remove(ref(db, `postReady/${postId}/${userId}`));
        const postSnap = await get(ref(db, `allPosts/${postId}`));
        if (postSnap.exists()) await push(ref(db, `notifications/${userId}`), { type: 'rejected', fromName: currentUser.name, message: `😔 ${currentUser.name} اعتذر عن طلبك في ${postSnap.val().clubName}`, timestamp: Date.now(), read: false });
        showToast("❌ تم الرفض");
    }

    function renderChatsTab() {
        const container = document.getElementById("appContainer");
        container.innerHTML = `<div class="header-actions"><h3 style="color:#64dcb4; display:flex; align-items:center; gap:6px; font-size:18px;"><span>💬</span> محادثاتي</h3>
            <div class="action-buttons"><button id="selectAllChatsBtn" class="select-all-btn small-btn">☑️ الكل</button><button id="deleteSelectedChatsBtn" class="delete-selected-btn small-btn" style="display:none;">🗑️ حذف</button><button id="cancelSelectChatsBtn" class="btn-outline small-btn" style="display:none;">إلغاء</button></div></div><div id="chatsList"></div>`;
        let selectedChats = new Set(), isSelectionMode = false;
        if (!currentUserId) return;
        onValue(ref(db, `userChats/${currentUserId}`), async (snapshot) => {
            const entries = snapshot.val() || {};
            let html = '';
            if (Object.keys(entries).length === 0) html = `<div class="empty-state">🎾 لا توجد دردشات<br><span>✏️ جهز على منشور</span></div>`;
            else {
                const entriesWithUnread = await Promise.all(Object.values(entries).map(async (entry) => {
                    const lastReadSnap = await get(ref(db, `userChats/${currentUserId}/${entry.chatId}/lastRead`));
                    const lastRead = lastReadSnap.val() || 0;
                    const messagesSnap = await get(ref(db, `chats/${entry.chatId}/messages`));
                    const messages = messagesSnap.val() || {};
                    let hasUnread = false;
                    Object.values(messages).forEach(msg => { if (msg.senderId !== currentUserId && msg.timestamp > lastRead) hasUnread = true; });
                    return { ...entry, hasUnread };
                }));
                html = entriesWithUnread.map(entry => `<div class="select-item" data-chatid="${entry.chatId}" onclick="if(!${isSelectionMode}) window.openChatAndUpdateRead('${entry.chatId}')">
                    <input type="checkbox" class="select-checkbox chat-checkbox" data-chatid="${entry.chatId}" style="${isSelectionMode?'display:inline-block':'display:none'}">
                    <div class="post-card" style="cursor:pointer; flex:1; ${entry.hasUnread?'border-right:3px solid #64dcb4;':''} margin-bottom:0;">
                        <div class="club-name">🎾 ${escapeHtml(entry.clubName)}</div><div class="post-detail">مع: ${escapeHtml(entry.otherName)}</div>
                        <div class="post-time">${new Date(entry.lastUpdated).toLocaleString('ar-EG')}</div>
                        ${entry.hasUnread?'<div style="color:#64dcb4; font-size:11px; margin-top:4px; font-weight:600;">📩 جديد</div>':''}
                    </div></div>`).join('');
            }
            document.getElementById("chatsList").innerHTML = html;
            document.querySelectorAll('.chat-checkbox').forEach(cb => cb.addEventListener('change', (e) => { e.stopPropagation(); const chatId = cb.dataset.chatid; cb.checked ? selectedChats.add(chatId) : selectedChats.delete(chatId); updateDeleteButton(); }));
        });
        function updateDeleteButton() { const btn = document.getElementById('deleteSelectedChatsBtn'); if(btn) btn.style.display = selectedChats.size>0?'inline-block':'none'; }
        document.getElementById('selectAllChatsBtn').addEventListener('click', () => { isSelectionMode=true; document.querySelectorAll('.chat-checkbox').forEach(cb=>{cb.style.display='inline-block';cb.checked=true;selectedChats.add(cb.dataset.chatid);}); document.getElementById('deleteSelectedChatsBtn').style.display='inline-block'; document.getElementById('cancelSelectChatsBtn').style.display='inline-block'; document.getElementById('selectAllChatsBtn').style.display='none'; updateDeleteButton(); });
        document.getElementById('cancelSelectChatsBtn')?.addEventListener('click', () => { isSelectionMode=false; selectedChats.clear(); document.querySelectorAll('.chat-checkbox').forEach(cb=>{cb.style.display='none';cb.checked=false;}); document.getElementById('deleteSelectedChatsBtn').style.display='none'; document.getElementById('cancelSelectChatsBtn').style.display='none'; document.getElementById('selectAllChatsBtn').style.display='inline-block'; });
        document.getElementById('deleteSelectedChatsBtn')?.addEventListener('click', async () => { if(selectedChats.size===0)return; if(!confirm(`⚠️ حذف ${selectedChats.size} دردشة؟`))return; for(const chatId of selectedChats){await remove(ref(db,`chats/${chatId}`)); await remove(ref(db,`userChats/${currentUserId}/${chatId}`));} showToast(`✅ تم الحذف`); selectedChats.clear(); document.getElementById('cancelSelectChatsBtn')?.click(); loadUnreadMessagesCount(); });
    }

    async function renderProfileTab() {
