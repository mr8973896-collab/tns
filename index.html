    function loadAllPostsForHome() {
        onValue(ref(db, "allPosts"), (snapshot) => {
            const posts = snapshot.val() || {};
            let postsArray = Object.entries(posts).map(([id, data]) => ({ id, ...data }))
                .filter(post => !post.completed && post.eventTimestamp && post.eventTimestamp > Date.now()).reverse();
            let html = '';
            if (postsArray.length === 0) html = `<div class="empty-state">🎾 لا توجد مباريات متاحة حالياً<br><span>✏️ كن أول من ينشر موعداً!</span></div>`;
            else postsArray.forEach(post => {
                const eventDate = new Date(post.eventTimestamp);
                const formattedEvent = `${eventDate.toLocaleDateString('ar-EG', {weekday:'short', day:'numeric', month:'long'})} - ${eventDate.toLocaleTimeString('ar-EG', {hour:'numeric', minute:'2-digit'})}`;
                html += `<div class="post-card" id="post-${post.id}">
                    <div class="post-header"><span class="club-name">🎾 ${escapeHtml(post.clubName)}</span><span class="post-time">${formattedEvent}</span></div>
                    <div class="post-detail">🕐 ${escapeHtml(post.time)}</div>
                    <div class="post-detail">📍 ${escapeHtml(post.location||'غير محدد')}</div>
                    <div class="post-detail">👥 يحتاج ${post.neededPlayers||'؟'} لاعب • ${escapeHtml(post.preferredLevel||'غير محدد')}</div>
                    <div class="post-detail">👤 ${escapeHtml(post.publisherName)}</div>
                    <div class="countdown-section" data-event-timestamp="${post.eventTimestamp}">⏳ <span class="time-remaining"></span> • 👥 <span class="remaining-spots">${Math.max(0, (post.neededPlayers||9999))}</span> مكان متاح</div>
                    <div class="ready-section"></div></div>`;
            });
            document.getElementById("postsList").innerHTML = html;
            postsArray.forEach(post => {
                const isOwner = post.publisherId === currentUserId;
                const readyRef = ref(db, `postReady/${post.id}`);
                onValue(readyRef, (readySnap) => {
                    const readyUsers = readySnap.val() || {};
                    const approvedCount = Object.values(readyUsers).filter(u => u.status === 'approved').length;
                    const needed = post.neededPlayers || 9999;
                    const remaining = Math.max(0, needed - approvedCount);
                    const isUserReady = readyUsers[currentUserId] !== undefined;
                    const isUserApproved = readyUsers[currentUserId]?.status === 'approved';
                    const postElement = document.getElementById(`post-${post.id}`);
                    if (!postElement) return;
                    const readyDiv = postElement.querySelector('.ready-section');
                    const countdownSection = postElement.querySelector('.countdown-section');
                    if (countdownSection) {
                        countdownSection.querySelector('.time-remaining').textContent = countdownSection.dataset.eventTimestamp ? 
                            `${Math.floor((parseInt(countdownSection.dataset.eventTimestamp)-Date.now())/(1000*60*60))}س ${Math.floor(((parseInt(countdownSection.dataset.eventTimestamp)-Date.now())%(1000*60*60))/(1000*60))}د` : '';
                        countdownSection.querySelector('.remaining-spots').textContent = remaining;
                    }
                    if (!readyDiv) return;
                    if (isOwner) {
                        let usersHtml = '';
                        Object.entries(readyUsers).forEach(([userId, userData]) => {
                            if (userData.status === 'waiting') usersHtml += `<div class="ready-user-item"><span>🎾 ${escapeHtml(userData.name)}</span><div>
                                <button class="approve-btn" data-userid="${userId}" data-username="${escapeHtml(userData.name)}" data-postid="${post.id}" data-postclub="${escapeHtml(post.clubName)}" data-posttime="${escapeHtml(post.time)}">✅</button>
                                <button class="reject-btn" data-userid="${userId}" data-postid="${post.id}">❌</button></div></div>`;
                        });
                        readyDiv.innerHTML = `<div class="ready-count-badge">👥 ${approvedCount}/${needed===9999?'∞':needed} • ${Object.keys(readyUsers).length} طلب انضمام</div>${usersHtml ? `<div class="ready-users-list">${usersHtml}</div>` : '<div class="ready-users-list" style="color:var(--text-muted); text-align:center; padding:12px; font-size:14px;">لا يوجد طلبات حالياً</div>'}`;
                        readyDiv.querySelectorAll('.approve-btn').forEach(btn => btn.addEventListener('click', () => approveUser(btn.dataset.userid, btn.dataset.username, btn.dataset.postid, btn.dataset.postclub, btn.dataset.posttime)));
                        readyDiv.querySelectorAll('.reject-btn').forEach(btn => btn.addEventListener('click', () => rejectUser(btn.dataset.userid, btn.dataset.postid)));
                    } else {
                        let readyContent = `<div class="ready-count-badge">👥 ${approvedCount}/${needed===9999?'∞':needed} • باقي ${remaining} مكان</div>`;
                        if (isUserApproved) {
                            const chatId = [currentUserId, post.publisherId].sort().join('_');
                            readyContent += `<div style="margin-top:8px; padding:12px; background:linear-gradient(135deg,var(--color-primary),var(--color-secondary)); color:var(--text-dark); border-radius:24px; text-align:center; font-weight:800; font-size:14px; box-shadow: 0 4px 15px rgba(139,195,74,0.4);">✅ تمت الموافقة عليك</div>
                                <button class="approved-badge" onclick="window.switchToTabAndOpenChat('chats', '${chatId}')" style="padding:12px; font-size:14px; margin-top:8px;">💬 دردشة مع الفريق</button>
                                <button class="cancel-ready-btn" data-postid="${post.id}" style="margin-top:8px; padding:10px; font-size:13px;">❌ سحب طلبي</button>`;
                        } else if (isUserReady) {
                            readyContent += `<button class="cancel-ready-btn" data-postid="${post.id}" style="margin-top:8px; padding:10px; font-size:13px;">❌ سحب طلبي</button><div class="waiting-badge" style="text-align:center; margin-top:10px; padding:8px 12px; font-size:12px;">⏳ في قائمة الانتظار</div>`;
                        } else {
                            if (remaining > 0) readyContent += `<button class="ready-btn-new" data-post-id="${post.id}" data-post-club="${escapeHtml(post.clubName)}" data-post-time="${escapeHtml(post.time)}" data-post-publisher="${escapeHtml(post.publisherName)}" data-post-publisherid="${post.publisherId}" data-post-preferredlevel="${escapeHtml(post.preferredLevel||'')}" style="padding:13px; font-size:14px; margin-top:10px;">🎾 جاهز للعب</button>`;
                            else readyContent += `<div class="waiting-badge" style="text-align:center; padding:14px; font-size:14px; margin-top:10px; font-weight:700;">🎉 اكتمل الفريق بنجاح</div>`;
                        }
                        readyDiv.innerHTML = readyContent;
                        const readyBtn = readyDiv.querySelector('.ready-btn-new');
                        if (readyBtn) readyBtn.addEventListener('click', (e) => handleReadyClick(e, post.id, post.clubName, post.time, post.publisherName, post.publisherId, e.currentTarget.dataset.postPreferredlevel||''));
                        const cancelBtn = readyDiv.querySelector('.cancel-ready-btn');
                        if (cancelBtn) cancelBtn.addEventListener('click', () => cancelReady(post.id));
                    }
                });
            });
        });
    }

    async function handleReadyClick(e, postId, clubName, eventTime, publisherName, publisherId, preferredLevel = '') {
        if (publisherId === currentUserId) { showToast("لا يمكنك التجهيز على منشورك الخاص"); return; }
        const userLevelVal = getLevelValue(currentUser.tennisLevel);
        const requiredLevelVal = getLevelValue(preferredLevel);
        if (requiredLevelVal > 0 && userLevelVal < requiredLevelVal) { showToast(`مستواك أقل من المطلوب (${preferredLevel})`); return; }
        await set(ref(db, `postReady/${postId}/${currentUserId}`), { name: currentUser.name, userId: currentUserId, status: 'waiting', timestamp: Date.now() });
        await push(ref(db, `notifications/${publisherId}`), { type: 'new_ready', fromName: currentUser.name, fromId: currentUserId, clubName, postId, message: `🔔 ${currentUser.name} جاهز للعب في ${clubName}`, timestamp: Date.now(), read: false });
        showToast(`✅ تم إرسال طلبك إلى ${publisherName}`);
    }

    async function cancelReady(postId) {
        await remove(ref(db, `postReady/${postId}/${currentUserId}`));
        try {
            const postSnap = await get(ref(db, `allPosts/${postId}`));
            if (postSnap.exists()) {
                const post = postSnap.val();
                await push(ref(db, `notifications/${post.publisherId}`), { type: 'withdraw', fromName: currentUser.name, message: `😔 ${currentUser.name} سحب طلبه من ${post.clubName}`, timestamp: Date.now(), read: false });
                if (post.completed) {
                    const readySnap = await get(ref(db, `postReady/${postId}`));
                    const rUsers = readySnap.val() || {};
                    const approvedC = Object.values(rUsers).filter(u => u.status === 'approved').length;
                    if (approvedC < (post.neededPlayers||9999)) await update(ref(db, `allPosts/${postId}`), { completed: false });
                }
            }
        } catch(e) {}
        showToast("❌ تم سحب الطلب بنجاح");
    }

    async function approveUser(userId, userName, postId, clubName, eventTime) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-content"><h3 style="color:var(--color-primary); margin-bottom:18px; text-align:center; font-size:20px; font-weight:800;">✉️ إرسال رسالة تأكيد</h3>
            <div style="background:rgba(15,35,28,0.85); padding:14px; border-radius:16px; margin-bottom:20px; font-size:14px; line-height:1.5; border:1.5px solid var(--border-active);">🎉 أهلاً بك ${escapeHtml(userName)}!<br>✅ الموعد تمام ومؤكد 🤝 <span style="color:var(--color-primary); font-weight:700;">${escapeHtml(clubName)}</span></div>
            <div style="display:flex; gap:14px;"><button id="cancelSendBtn" class="btn-outline" style="flex:1; padding:14px; font-size:15px;">إلغاء</button><button id="confirmSendBtn" class="btn-primary" style="flex:1; padding:14px; font-size:15px;">📤 إرسال وتأكيد</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("cancelSendBtn").addEventListener("click", () => modal.remove());
        document.getElementById("confirmSendBtn").addEventListener("click", async () => {
            modal.remove();
            await update(ref(db), { [`postReady/${postId}/${userId}/status`]: 'approved' });
            const chatId = [currentUserId, userId].sort().join('_');
            await set(ref(db, `chats/${chatId}`), { participants: [currentUserId, userId], participantNames: { [currentUserId]: currentUser.name, [userId]: userName }, createdAt: Date.now(), clubName, postId, eventTime });
            await set(ref(db, `userChats/${currentUserId}/${chatId}`), { chatId, otherId: userId, otherName: userName, clubName, lastUpdated: Date.now(), lastRead: Date.now() });
            await set(ref(db, `userChats/${userId}/${chatId}`), { chatId, otherId: currentUserId, otherName: currentUser.name, clubName, lastUpdated: Date.now(), lastRead: 0 });
            const msgRef = push(ref(db, `chats/${chatId}/messages`));
            await set(msgRef, { senderId: currentUserId, senderName: currentUser.name, text: `🎉 أهلاً ${userName}!\n✅ الموعد تمام ومؤكد 🤝 ${clubName}`, timestamp: Date.now() });
            await push(ref(db, `notifications/${userId}`), { type: 'approved', fromName: currentUser.name, chatId, message: `🎉 ${currentUser.name} وافق على طلبك! اذهب للدردشة`, timestamp: Date.now(), read: false });
            const readySnap = await get(ref(db, `postReady/${postId}`));
            const rUsers = readySnap.val() || {};
            const approvedUsers = Object.values(rUsers).filter(u => u.status === 'approved');
            const postSnap = await get(ref(db, `allPosts/${postId}`));
            if (postSnap.exists()) {
                const post = postSnap.val();
                const needed = post.neededPlayers || 9999;
                if (approvedUsers.length >= needed) {
                    const teamChatId = `team_${postId}`;
                    const approvedNames = approvedUsers.map(u => u.name);
                    const allParticipants = [post.publisherId, ...approvedUsers.map(u => u.userId)];
                    await set(ref(db, `completedPosts/${postId}`), { ...post, completedAt: Date.now(), approvedPlayers: approvedUsers.map(u => u.userId), approvedNames, teamChatId });
                    await set(ref(db, `chats/${teamChatId}`), { participants: allParticipants, participantNames: { [post.publisherId]: post.publisherName, ...Object.fromEntries(approvedUsers.map(u => [u.userId, u.name])) }, createdAt: Date.now(), clubName, postId, eventTime: post.time, isTeamChat: true });
                    for (const participantId of allParticipants) await set(ref(db, `userChats/${participantId}/${teamChatId}`), { chatId: teamChatId, otherName: "فريق التنس", clubName, lastUpdated: Date.now(), lastRead: Date.now(), isTeamChat: true });
                    const welcomeRef = push(ref(db, `chats/${teamChatId}/messages`));
                    await set(welcomeRef, { senderId: 'system', senderName: 'النظام', text: `🎉 أهلاً بالفريق الرائع! 🎾\nالموعد: ${post.time}\nالمكان: ${post.location||post.clubName}\nلنلعب مباراة ممتعة ورائعة! 💪🔥`, timestamp: Date.now(), isSystem: true });
                    for (const participantId of allParticipants) await push(ref(db, `notifications/${participantId}`), { type: 'team_complete', message: `🎉 اكتمل فريق ${post.clubName} بنجاح! الموعد: ${post.time}`, chatId: teamChatId, timestamp: Date.now(), read: false });
                    await update(ref(db, `allPosts/${postId}`), { completed: true, completedAt: Date.now(), teamChatId });
                    showToast("🎉 اكتمل الفريق! ظهر الإعلان في صفحة المكتمل");
                }
            }
            showToast(`✅ تمت الموافقة على ${userName} بنجاح`);
            setTimeout(() => window.openChat(chatId), 400);
        });
    }

    async function rejectUser(userId, postId) {
        await remove(ref(db, `postReady/${postId}/${userId}`));
        const postSnap = await get(ref(db, `allPosts/${postId}`));
        if (postSnap.exists()) await push(ref(db, `notifications/${userId}`), { type: 'rejected', fromName: currentUser.name, message: `😔 ${currentUser.name} اعتذر عن طلبك في ${postSnap.val().clubName}`, timestamp: Date.now(), read: false });
        showToast("❌ تم رفض الطلب");
    }

    function renderChatsTab() {
        const container = document.getElementById("appContainer");
        container.innerHTML = `<div class="header-actions"><h3 style="color:var(--color-primary); display:flex; align-items:center; gap:7px; font-size:20px; font-weight:800;"><span>💬</span> محادثاتي</h3>
            <div class="action-buttons"><button id="selectAllChatsBtn" class="select-all-btn small-btn">☑️ تحديد الكل</button><button id="deleteSelectedChatsBtn" class="delete-selected-btn small-btn" style="display:none;">🗑️ حذف المحدد</button><button id="cancelSelectChatsBtn" class="btn-outline small-btn" style="display:none;">إلغاء</button></div></div><div id="chatsList"></div>`;
        let selectedChats = new Set(), isSelectionMode = false;
        if (!currentUserId) return;
        onValue(ref(db, `userChats/${currentUserId}`), async (snapshot) => {
            const entries = snapshot.val() || {};
            let html = '';
            if (Object.keys(entries).length === 0) html = `<div class="empty-state">🎾 لا توجد دردشات حالياً<br><span>✏️ جهز على منشور للبدء</span></div>`;
            else {
                const entriesWithUnread = await Promise.all(Object.values(entries).map(async (entry) => {
                    const lastReadSnap = await get(ref(db, `userChats/${currentUserId}/${entry.chatId}/lastRead`));
                    const lastRead = lastReadSnap.val() || 0;
                    const messagesSnap = await get(ref(db, `chats/${entry.chatId}/messages`));
                    const messages = messagesSnap.val() || {};
                    let hasUnread = false;
                    Object.values(messages).forEach(msg => { if (msg.senderId !== currentUserId && msg.timestamp > lastRead) hasUnread = true; });
                    return { ...entry, hasUnread };
                }));
                html = entriesWithUnread.map(entry => `<div class="select-item" data-chatid="${entry.chatId}" onclick="if(!${isSelectionMode}) window.openChatAndUpdateRead('${entry.chatId}')">
                    <input type="checkbox" class="select-checkbox chat-checkbox" data-chatid="${entry.chatId}" style="${isSelectionMode?'display:inline-block':'display:none'}">
                    <div class="post-card" style="cursor:pointer; flex:1; ${entry.hasUnread?'border-right:4px solid var(--color-primary); box-shadow: var(--shadow-card), var(--shadow-glow);':''} margin-bottom:0; transition: var(--transition-smooth);">
                        <div class="club-name" style="font-size:18px;">🎾 ${escapeHtml(entry.clubName)}</div><div class="post-detail" style="font-size:14px;">مع: ${escapeHtml(entry.otherName)}</div>
                        <div class="post-time">${new Date(entry.lastUpdated).toLocaleString('ar-EG')}</div>
                        ${entry.hasUnread?'<div style="color:var(--color-primary); font-size:12px; margin-top:6px; font-weight:700; display:flex; align-items:center; gap:4px;"><span style="width:8px; height:8px; background:var(--color-primary); border-radius:50%; display:inline-block; box-shadow: 0 0 8px var(--color-primary);"></span> رسالة جديدة</div>':''}
                    </div></div>`).join('');
            }
            document.getElementById("chatsList").innerHTML = html;
            document.querySelectorAll('.chat-checkbox').forEach(cb => cb.addEventListener('change', (e) => { e.stopPropagation(); const chatId = cb.dataset.chatid; cb.checked ? selectedChats.add(chatId) : selectedChats.delete(chatId); updateDeleteButton(); }));
        });
        function updateDeleteButton() { const btn = document.getElementById('deleteSelectedChatsBtn'); if(btn) btn.style.display = selectedChats.size>0?'inline-block':'none'; }
        document.getElementById('selectAllChatsBtn').addEventListener('click', () => { isSelectionMode=true; document.querySelectorAll('.chat-checkbox').forEach(cb=>{cb.style.display='inline-block';cb.checked=true;selectedChats.add(cb.dataset.chatid);}); document.getElementById('deleteSelectedChatsBtn').style.display='inline-block'; document.getElementById('cancelSelectChatsBtn').style.display='inline-block'; document.getElementById('selectAllChatsBtn').style.display='none'; updateDeleteButton(); });
        document.getElementById('cancelSelectChatsBtn')?.addEventListener('click', () => { isSelectionMode=false; selectedChats.clear(); document.querySelectorAll('.chat-checkbox').forEach(cb=>{cb.style.display='none';cb.checked=false;}); document.getElementById('deleteSelectedChatsBtn').style.display='none'; document.getElementById('cancelSelectChatsBtn').style.display='none'; document.getElementById('selectAllChatsBtn').style.display='inline-block'; });
        document.getElementById('deleteSelectedChatsBtn')?.addEventListener('click', async () => { if(selectedChats.size===0)return; if(!confirm(`⚠️ حذف ${selectedChats.size} دردشة؟`))return; for(const chatId of selectedChats){await remove(ref(db,`chats/${chatId}`)); await remove(ref(db,`userChats/${currentUserId}/${chatId}`));} showToast(`✅ تم الحذف بنجاح`); selectedChats.clear(); document.getElementById('cancelSelectChatsBtn')?.click(); loadUnreadMessagesCount(); });
    }

    function renderNotificationsTab() {
        const container = document.getElementById("appContainer");
        container.innerHTML = `<div class="header-actions"><h3 style="color:var(--color-primary); display:flex; align-items:center; gap:7px; font-size:20px; font-weight:800;"><span>🔔</span> الإشعارات</h3>
            <div class="action-buttons"><button id="selectAllNotifsBtn" class="select-all-btn small-btn">☑️ تحديد الكل</button><button id="deleteSelectedNotifsBtn" class="delete-selected-btn small-btn" style="display:none;">🗑️ حذف المحدد</button><button id="cancelSelectNotifsBtn" class="btn-outline small-btn" style="display:none;">إلغاء</button></div></div><div id="notifList"></div>`;
        let selectedNotifs = new Set(), isSelectionMode = false;
        if (!currentUserId) return;
        onValue(ref(db, `notifications/${currentUserId}`), (snapshot) => {
            const notifs = snapshot.val() || {};
            let html = '';
            if (Object.keys(notifs).length === 0) html = `<div class="empty-state">🔔 لا توجد إشعارات جديدة</div>`;
            else html = Object.entries(notifs).reverse().map(([id, n]) => `<div class="select-item" data-notifid="${id}">
                <input type="checkbox" class="select-checkbox notif-checkbox" data-notifid="${id}" style="${isSelectionMode?'display:inline-block':'display:none'}">
                <div class="post-card" style="flex:1; ${!n.read?'border-right:4px solid var(--color-primary); box-shadow: var(--shadow-card), var(--shadow-glow);':''} margin-bottom:0; transition: var(--transition-smooth);">
                    <p style="line-height:1.45; font-size:15px; color:var(--text-secondary);">${escapeHtml(n.message)}</p><div class="post-time">${new Date(n.timestamp).toLocaleString('ar-EG')}</div>
                    ${n.chatId?`<button class="ready-btn-new" onclick="event.stopPropagation(); window.openChatAndUpdateRead('${n.chatId}')" style="margin-top:12px; padding:10px 16px; font-size:13px;">💬 الرد الآن</button>`:''}
                </div></div>`).join('');
            document.getElementById("notifList").innerHTML = html;
            document.querySelectorAll('.notif-checkbox').forEach(cb => cb.addEventListener('change', (e) => { e.stopPropagation(); const notifId = cb.dataset.notifid; cb.checked ? selectedNotifs.add(notifId) : selectedNotifs.delete(notifId); updateDeleteButton(); }));
        });
        function updateDeleteButton() { const btn = document.getElementById('deleteSelectedNotifsBtn'); if(btn) btn.style.display = selectedNotifs.size>0?'inline-block':'none'; }
        document.getElementById('selectAllNotifsBtn').addEventListener('click', () => { isSelectionMode=true; document.querySelectorAll('.notif-checkbox').forEach(cb=>{cb.style.display='inline-block';cb.checked=true;selectedNotifs.add(cb.dataset.notifid);}); document.getElementById('deleteSelectedNotifsBtn').style.display='inline-block'; document.getElementById('cancelSelectNotifsBtn').style.display='inline-block'; document.getElementById('selectAllNotifsBtn').style.display='none'; updateDeleteButton(); });
        document.getElementById('cancelSelectNotifsBtn')?.addEventListener('click', () => { isSelectionMode=false; selectedNotifs.clear(); document.querySelectorAll('.notif-checkbox').forEach(cb=>{cb.style.display='none';cb.checked=false;}); document.getElementById('deleteSelectedNotifsBtn').style.display='none'; document.getElementById('cancelSelectNotifsBtn').style.display='none'; document.getElementById('selectAllNotifsBtn').style.display='inline-block'; });
        document.getElementById('deleteSelectedNotifsBtn')?.addEventListener('click', async () => { if(selectedNotifs.size===0)return; if(!confirm(`⚠️ حذف ${selectedNotifs.size} إشعار؟`))return; for(const notifId of selectedNotifs) await remove(ref(db, `notifications/${currentUserId}/${notifId}`)); showToast(`✅ تم الحذف بنجاح`); selectedNotifs.clear(); document.getElementById('cancelSelectNotifsBtn')?.click(); loadUnreadNotificationsCount(); });
    }

    window.openChatAndUpdateRead = async function(chatId) { await updateLastRead(chatId); window.openChat(chatId); };
    window.switchToTabAndOpenChat = function(tab, chatId) { activeTab = tab; renderCurrentTab(); setTimeout(() => window.openChatAndUpdateRead(chatId), 200); };

    async function renderProfileTab() {
        const container = document.getElementById("appContainer");
        const postsSnap = await get(ref(db, "allPosts"));
        let myPostsCount = 0, myPosts = [];
        if (postsSnap.exists()) { const all = postsSnap.val(); myPosts = Object.entries(all).filter(([, p]) => p.publisherId === currentUserId); myPostsCount = myPosts.length; }
        const chatsSnap = await get(ref(db, `userChats/${currentUserId}`));
        const chatsCount = chatsSnap.exists() ? Object.keys(chatsSnap.val()).length : 0;
        container.innerHTML = `<div class="profile-header">
            <div class="avatar">${currentUser.name.charAt(0)}</div><h3 style="color:var(--color-primary); margin-top:8px; font-size:22px; font-weight:800; text-shadow: 0 0 12px rgba(200,255,110,0.3);">${escapeHtml(currentUser.name)}</h3>
            <p style="color:var(--text-muted); margin-top:6px; font-size:14px; line-height:1.5;">📞 ${currentUser.phone} &nbsp;|&nbsp; 🎂 ${currentUser.age} سنة &nbsp;|&nbsp; 🎾 ${currentUser.tennisLevel||'غير محدد'}</p></div>
            <div class="stats-row">
                <div class="stat" id="myPostsStat"><div class="stat-number">${myPostsCount}</div><span style="color:var(--text-muted); font-size:13px; display:block; margin-top:4px;">📝 منشوراتي</span></div>
                <div class="stat"><div class="stat-number">${chatsCount}</div><span style="color:var(--text-muted); font-size:13px; display:block; margin-top:4px;">💬 دردشات</span></div></div>
            <div style="display:flex; gap:14px; margin-top:24px; width:100%; max-width:340px;">
                <button id="editProfileBtn" class="btn-primary" style="flex:1; padding:16px 18px; font-size:15px;">✏️ تعديل البيانات</button>
                <button id="logoutFromProfile" class="btn-danger" style="flex:1; padding:16px 18px; font-size:15px;">🚪 خروج</button></div>`;
        document.getElementById("editProfileBtn").addEventListener("click", showEditProfileModal);
        document.getElementById("logoutFromProfile").addEventListener("click", showLogoutConfirmModal);
        document.getElementById("myPostsStat").addEventListener("click", () => showMyPostsModal(myPosts));
    }

    async function showMyPostsModal(myPosts) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        let postsHtml = myPosts.length === 0 ? '<div class="empty-state">🎾 ليس لديك منشورات حتى الآن</div>' : myPosts.map(([id, post]) => `<div style="background:rgba(18,38,30,0.75); border-radius:20px; padding:14px; margin-bottom:14px; border:1.5px solid var(--border-light); transition: var(--transition-smooth);">
            <div class="club-name" style="font-size:18px;">🎾 ${escapeHtml(post.clubName)}</div><div class="post-detail" style="font-size:14px;">🕐 ${escapeHtml(post.time)}</div>
            <div class="post-detail" style="font-size:14px;">📍 ${escapeHtml(post.location||'غير محدد')}</div><div class="post-detail" style="font-size:14px;">👥 ${post.neededPlayers||'؟'} لاعب • ${escapeHtml(post.preferredLevel||'غير محدد')}</div>
            <div class="post-detail" style="font-size:14px;">📅 ${new Date(post.eventTimestamp||post.timestamp).toLocaleString('ar-EG')}</div>
            <button class="delete-post-btn" data-post-id="${id}" style="background:linear-gradient(135deg, var(--color-error), var(--color-error-dark)); border:none; padding:9px 18px; border-radius:24px; color:white; margin-top:10px; font-weight:700; font-size:13px; width:100%;">🗑️ حذف هذا المنشور</button></div>`).join('');
        modal.innerHTML = `<div class="modal-content" style="max-height:68vh;"><div style="display:flex; justify-content:space-between; margin-bottom:18px; align-items:center;"><h3 style="color:var(--color-primary); font-size:20px; font-weight:800;">📝 منشوراتي</h3><button onclick="this.closest('.modal').remove()" style="background:none; border:none; font-size:26px; color:var(--color-error); cursor:pointer; transition: transform 0.2s;">✕</button></div><div id="myPostsList">${postsHtml}</div></div>`;
        document.body.appendChild(modal);
        document.querySelectorAll('.delete-post-btn').forEach(btn => btn.addEventListener('click', async (e) => { e.stopPropagation(); const postId = btn.dataset.postId; if(confirm("⚠️ هل أنت متأكد من حذف هذا المنشور؟")) { await remove(ref(db, `allPosts/${postId}`)); await remove(ref(db, `postReady/${postId}`)); await remove(ref(db, `completedPosts/${postId}`)); showToast("✅ تم حذف المنشور بنجاح"); modal.remove(); if(activeTab==="profile") renderProfileTab(); if(activeTab==="home") renderHomeTab(); }}));
    }

    window.openChat = async function(chatId) {
        await updateLastRead(chatId);
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-content chat-modal-content"><div style="display:flex; justify-content:space-between; margin-bottom:12px; align-items:center;"><h3 id="chatTitle" style="color:var(--color-primary); display:flex; align-items:center; gap:7px; font-size:18px; font-weight:800;">💬 دردشة</h3><button onclick="this.closest('.modal').remove()" style="background:none; border:none; font-size:30px; color:var(--color-error); cursor:pointer; transition: transform 0.2s;">✕</button></div><div id="chatMessages" class="messages-container"></div><div style="display:flex; gap:10px; margin-top:12px;"><input id="msgInput" type="text" placeholder="اكتب رسالتك..." style="flex:1; margin-bottom:0; padding:14px 18px; border-radius:30px;"><button id="sendMsgBtn" style="background:linear-gradient(135deg, var(--color-primary), var(--color-secondary)); border:none; padding:14px 24px; border-radius:32px; color:var(--text-dark); font-weight:800; cursor:pointer; font-size:14px; box-shadow: 0 6px 20px rgba(139,195,74,0.45);">إرسال ✨</button></div></div>`;
        document.body.appendChild(modal);
        const chatSnap = await get(ref(db, `chats/${chatId}`));
        if (chatSnap.exists()) { const chat = chatSnap.val(); const other = Object.entries(chat.participantNames).find(([id]) => id !== currentUserId); document.getElementById("chatTitle").textContent = `💬 ${escapeHtml(other?other[1]:'اللاعب')}`; }
        const messagesRef = ref(db, `chats/${chatId}/messages`);
        onValue(messagesRef, (snapshot) => {
            const msgs = snapshot.val() || {};
            let html = '';
            Object.entries(msgs).sort(([,a],[,b])=>a.timestamp-b.timestamp).forEach(([,msg]) => {
                const isMine = msg.senderId === currentUserId;
                const systemClass = msg.isSystem ? 'style="background:linear-gradient(135deg, var(--color-primary), var(--color-secondary)); color:var(--text-dark); text-align:center; font-weight:700; border:none; max-width:95%; align-self:center; box-shadow: 0 5px 18px rgba(139,195,74,0.4);"' : '';
                html += `<div class="message ${isMine?'my-message':'other-message'}" ${systemClass}><small style="opacity:0.85; font-size:11px; display:block; margin-bottom:3px; font-weight:600;">${escapeHtml(msg.senderName)}</small>${escapeHtml(msg.text)}<div style="font-size:10px; margin-top:5px; opacity:0.6; text-align:right; font-weight:500;">${new Date(msg.timestamp).toLocaleTimeString('ar-EG')}</div></div>`;
            });
            const container = document.getElementById("chatMessages");
            if (container) { container.innerHTML = html; container.scrollTop = container.scrollHeight; }
        });
        document.getElementById("sendMsgBtn").addEventListener("click", async () => { const text = document.getElementById("msgInput").value.trim(); if(!text) return; const msgRef = push(ref(db, `chats/${chatId}/messages`)); await set(msgRef, { senderId: currentUserId, senderName: currentUser.name, text, timestamp: Date.now() }); await set(ref(db, `userChats/${currentUserId}/${chatId}/lastUpdated`), Date.now()); document.getElementById("msgInput").value = ""; document.getElementById("msgInput").focus(); });
        document.getElementById("msgInput").addEventListener("keypress", (e) => { if(e.key==="Enter") document.getElementById("sendMsgBtn").click(); });
        document.getElementById("msgInput").focus();
        modal.addEventListener('click', (e) => { if(e.target===modal) modal.remove(); });
    };

    function openAddPostModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-content">
            <h3 style="margin-bottom:20px; color:var(--color-primary); text-align:center; font-size:20px; font-weight:800;"><span>🎾</span> إنشاء منشور جديد</h3>
            <input id="clubName" placeholder="اسم النادي أو المكان" style="text-align:center;">
            <input id="location" placeholder="الموقع بالتفصيل" style="text-align:center;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;"><input id="eventDate" type="date" style="text-align:center;"><input id="eventTimeInput" type="time" style="text-align:center;"></div>
            <input type="number" id="neededPlayers" placeholder="عدد اللاعبين المطلوب" min="1" style="text-align:center;">
            <select id="preferredLevel" style="background:var(--bg-input); border:1.8px solid var(--border-light); padding:15px 20px; border-radius:28px; color:var(--text-primary); width:100%; margin-bottom:16px; font-size:15px;">
                <option value="">المستوى المطلوب للاعبين</option><option value="مبتدئ">مبتدئ</option><option value="أقل من متوسط">أقل من متوسط</option><option value="متوسط">متوسط</option><option value="أعلى من متوسط">أعلى من متوسط</option><option value="محترف">محترف</option>
            </select>
            <div style="display:flex; gap:14px; margin-top:20px;"><button id="cancelModal" class="btn-outline" style="flex:1; padding:15px; font-size:15px;">إلغاء</button><button id="publishPost" class="btn-primary" style="flex:1; padding:15px; font-size:15px;">✨ نشر المنشور</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("cancelModal").addEventListener("click", () => modal.remove());
        document.getElementById("publishPost").addEventListener("click", async () => {
            const clubName = document.getElementById("clubName").value.trim();
            const location = document.getElementById("location").value.trim();
            const eventDate = document.getElementById("eventDate").value;
            const eventTimeInput = document.getElementById("eventTimeInput").value;
            const neededPlayers = parseInt(document.getElementById("neededPlayers").value);
            const preferredLevel = document.getElementById("preferredLevel").value;
            if (!clubName || !location || !eventDate || !eventTimeInput || !neededPlayers || neededPlayers<1 || !preferredLevel) return alert("⚠️ يرجى ملء جميع الحقول المطلوبة");
            const eventDateTime = `${eventDate}T${eventTimeInput}:00`;
            const eventTimestamp = new Date(eventDateTime).getTime();
            if (isNaN(eventTimestamp) || eventTimestamp < Date.now()+7200000) return alert("⚠️ يجب أن يكون الموعد بعد ساعتين على الأقل من الآن");
            const displayTime = new Date(eventTimestamp).toLocaleString('ar-EG', { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'numeric', minute:'2-digit' });
            await push(ref(db, "allPosts"), { clubName, location, time: displayTime, eventTimestamp, neededPlayers, preferredLevel, publisherName: currentUser.name, publisherPhone: currentUser.phone, publisherId: currentUserId, timestamp: Date.now(), completed: false });
            modal.remove(); showToast("✅ تم نشر المنشور بنجاح! 🎾"); if(activeTab==="home") renderHomeTab();
        });
        document.getElementById("clubName").focus();
    }

    function logout() {
        localStorage.clear(); currentUser = null; currentUserId = null;
        if(notificationListener) notificationListener(); if(chatsListener) chatsListener(); if(completedAnnouncementsListener) completedAnnouncementsListener();
        if(countdownInterval) clearInterval(countdownInterval); countdownInterval = null; completedAnnouncementsListener = null;
        showRegisterCard();
    }

    function bindTabs() {
        document.querySelectorAll('.tab-item').forEach(btn => btn.addEventListener('click', (e) => { activeTab = btn.dataset.tab; renderCurrentTab(); }));
    }

    async function initApp() {
        currentUserId = localStorage.getItem('tennisApp_userId');
        if (currentUserId) { const snap = await get(child(ref(db, "users"), currentUserId)); if(snap.exists()) { currentUser = snap.val(); showMainApp(); bindTabs(); return; } }
        showRegisterCard(); bindTabs();
    }
    initApp();
</script>
</body>
