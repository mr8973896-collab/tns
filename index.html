        const postsSnap = await get(ref(db, "allPosts"));
        let myPostsCount = 0, myPosts = [];
        if (postsSnap.exists()) { const all = postsSnap.val(); myPosts = Object.entries(all).filter(([, p]) => p.publisherId === currentUserId); myPostsCount = myPosts.length; }
        const chatsSnap = await get(ref(db, `userChats/${currentUserId}`));
        const chatsCount = chatsSnap.exists() ? Object.keys(chatsSnap.val()).length : 0;
        container.innerHTML = `<div class="profile-header">
            <div class="avatar">${currentUser.name.charAt(0)}</div><h3 style="color:#64dcb4; margin-top:6px;">${escapeHtml(currentUser.name)}</h3>
            <p style="color:#aaa; margin-top:4px; font-size:13px;">📞 ${currentUser.phone} | 🎂 ${currentUser.age} | 🎾 ${currentUser.tennisLevel||'غير محدد'}</p></div>
            <div class="stats-row">
                <div class="stat" id="myPostsStat"><div class="stat-number">${myPostsCount}</div><span style="color:#aaa; font-size:12px;">📝 منشوراتي</span></div>
                <div class="stat"><div class="stat-number">${chatsCount}</div><span style="color:#aaa; font-size:12px;">💬 دردشات</span></div></div>
            <div style="display:flex; gap:12px; margin-top:20px;">
                <button id="editProfileBtn" class="btn-primary" style="flex:1; padding:14px 18px;">✏️ تعديل</button>
                <button id="logoutFromProfile" class="btn-danger" style="flex:1; padding:14px 18px;">🚪 خروج</button></div>`;
        document.getElementById("editProfileBtn").addEventListener("click", showEditProfileModal);
        document.getElementById("logoutFromProfile").addEventListener("click", showLogoutConfirmModal);
        document.getElementById("myPostsStat").addEventListener("click", () => showMyPostsModal(myPosts));
    }

    async function showMyPostsModal(myPosts) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        let postsHtml = myPosts.length === 0 ? '<div class="empty-state">🎾 ليس لديك منشورات</div>' : myPosts.map(([id, post]) => `<div style="background:rgba(30,30,50,0.7); border-radius:16px; padding:12px; margin-bottom:12px; border:1px solid rgba(100,220,180,0.15);">
            <div class="club-name">🎾 ${escapeHtml(post.clubName)}</div><div class="post-detail">🕐 ${escapeHtml(post.time)}</div>
            <div class="post-detail">📍 ${escapeHtml(post.location||'غير محدد')}</div><div class="post-detail">👥 ${post.neededPlayers||'؟'} لاعب • ${escapeHtml(post.preferredLevel||'غير محدد')}</div>
            <div class="post-detail">📅 ${new Date(post.eventTimestamp||post.timestamp).toLocaleString('ar-EG')}</div>
            <button class="delete-post-btn" data-post-id="${id}" style="background:linear-gradient(135deg, #ff6b6b, #ee5a5a); border:none; padding:8px 16px; border-radius:20px; color:white; margin-top:8px; font-weight:600; font-size:12px;">🗑️ حذف</button></div>`).join('');
        modal.innerHTML = `<div class="modal-content" style="max-height:65vh;"><div style="display:flex; justify-content:space-between; margin-bottom:16px; align-items:center;"><h3 style="color:#64dcb4; font-size:18px;">📝 منشوراتي</h3><button onclick="this.closest('.modal').remove()" style="background:none; border:none; font-size:24px; color:#ff6b6b; cursor:pointer;">✕</button></div><div id="myPostsList">${postsHtml}</div></div>`;
        document.body.appendChild(modal);
        document.querySelectorAll('.delete-post-btn').forEach(btn => btn.addEventListener('click', async (e) => { e.stopPropagation(); const postId = btn.dataset.postId; if(confirm("حذف هذا المنشور؟")) { await remove(ref(db, `allPosts/${postId}`)); await remove(ref(db, `postReady/${postId}`)); await remove(ref(db, `completedPosts/${postId}`)); showToast("✅ تم الحذف"); modal.remove(); if(activeTab==="profile") renderProfileTab(); if(activeTab==="home") renderHomeTab(); }}));
    }

    window.openChat = async function(chatId) {
        await updateLastRead(chatId);
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-content chat-modal-content"><div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;"><h3 id="chatTitle" style="color:#64dcb4; display:flex; align-items:center; gap:6px; font-size:17px;">💬 دردشة</h3><button onclick="this.closest('.modal').remove()" style="background:none; border:none; font-size:28px; color:#ff6b6b; cursor:pointer;">✕</button></div><div id="chatMessages" class="messages-container"></div><div style="display:flex; gap:8px; margin-top:10px;"><input id="msgInput" type="text" placeholder="اكتب..." style="flex:1; margin-bottom:0; padding:12px 16px;"><button id="sendMsgBtn" style="background:linear-gradient(135deg, #64dcb4, #4dd0c0); border:none; padding:12px 22px; border-radius:30px; color:#0a1a15; font-weight:700; cursor:pointer; font-size:13px;">إرسال</button></div></div>`;
        document.body.appendChild(modal);
        const chatSnap = await get(ref(db, `chats/${chatId}`));
        if (chatSnap.exists()) { const chat = chatSnap.val(); const other = Object.entries(chat.participantNames).find(([id]) => id !== currentUserId); document.getElementById("chatTitle").textContent = `💬 ${escapeHtml(other?other[1]:'اللاعب')}`; }
        const messagesRef = ref(db, `chats/${chatId}/messages`);
        onValue(messagesRef, (snapshot) => {
            const msgs = snapshot.val() || {};
            let html = '';
            Object.entries(msgs).sort(([,a],[,b])=>a.timestamp-b.timestamp).forEach(([,msg]) => {
                const isMine = msg.senderId === currentUserId;
                const systemClass = msg.isSystem ? 'style="background:linear-gradient(135deg, #b478ff, #64dcb4); color:#0a1a15; text-align:center; font-weight:600; border:none; max-width:95%; align-self:center;"' : '';
                html += `<div class="message ${isMine?'my-message':'other-message'}" ${systemClass}><small style="opacity:0.8; font-size:10px; display:block; margin-bottom:2px;">${escapeHtml(msg.senderName)}</small>${escapeHtml(msg.text)}<div style="font-size:9px; margin-top:4px; opacity:0.5; text-align:right;">${new Date(msg.timestamp).toLocaleTimeString('ar-EG')}</div></div>`;
            });
            const container = document.getElementById("chatMessages");
            if (container) { container.innerHTML = html; container.scrollTop = container.scrollHeight; }
        });
        document.getElementById("sendMsgBtn").addEventListener("click", async () => { const text = document.getElementById("msgInput").value.trim(); if(!text) return; const msgRef = push(ref(db, `chats/${chatId}/messages`)); await set(msgRef, { senderId: currentUserId, senderName: currentUser.name, text, timestamp: Date.now() }); await set(ref(db, `userChats/${currentUserId}/${chatId}/lastUpdated`), Date.now()); document.getElementById("msgInput").value = ""; document.getElementById("msgInput").focus(); });
        document.getElementById("msgInput").addEventListener("keypress", (e) => { if(e.key==="Enter") document.getElementById("sendMsgBtn").click(); });
        document.getElementById("msgInput").focus();
        modal.addEventListener('click', (e) => { if(e.target===modal) modal.remove(); });
    };

    function openAddPostModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-content">
            <h3 style="margin-bottom:18px; color:#64dcb4; text-align:center; font-size:18px;"><span>🎾</span> منشور جديد</h3>
            <input id="clubName" placeholder="اسم النادي" style="text-align:center;">
            <input id="location" placeholder="الموقع" style="text-align:center;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"><input id="eventDate" type="date" style="text-align:center;"><input id="eventTimeInput" type="time" style="text-align:center;"></div>
            <input type="number" id="neededPlayers" placeholder="عدد اللاعبين" min="1" style="text-align:center;">
            <select id="preferredLevel" style="background:rgba(30,30,50,0.8); border:1.5px solid rgba(100,220,180,0.25); padding:14px 18px; border-radius:24px; color:white; width:100%; margin-bottom:14px;">
                <option value="">المستوى المطلوب</option><option value="مبتدئ">مبتدئ</option><option value="أقل من متوسط">أقل من متوسط</option><option value="متوسط">متوسط</option><option value="أعلى من متوسط">أعلى من متوسط</option><option value="محترف">محترف</option>
            </select>
            <div style="display:flex; gap:12px; margin-top:18px;"><button id="cancelModal" class="btn-outline" style="flex:1;">إلغاء</button><button id="publishPost" class="btn-primary" style="flex:1;">✨ نشر</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("cancelModal").addEventListener("click", () => modal.remove());
        document.getElementById("publishPost").addEventListener("click", async () => {
            const clubName = document.getElementById("clubName").value.trim();
            const location = document.getElementById("location").value.trim();
            const eventDate = document.getElementById("eventDate").value;
            const eventTimeInput = document.getElementById("eventTimeInput").value;
            const neededPlayers = parseInt(document.getElementById("neededPlayers").value);
            const preferredLevel = document.getElementById("preferredLevel").value;
            if (!clubName || !location || !eventDate || !eventTimeInput || !neededPlayers || neededPlayers<1 || !preferredLevel) return alert("⚠️ املأ جميع الحقول");
            const eventDateTime = `${eventDate}T${eventTimeInput}:00`;
            const eventTimestamp = new Date(eventDateTime).getTime();
            if (isNaN(eventTimestamp) || eventTimestamp < Date.now()+7200000) return alert("⚠️ الموعد بعد ساعتين على الأقل");
            const displayTime = new Date(eventTimestamp).toLocaleString('ar-EG', { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'numeric', minute:'2-digit' });
            await push(ref(db, "allPosts"), { clubName, location, time: displayTime, eventTimestamp, neededPlayers, preferredLevel, publisherName: currentUser.name, publisherPhone: currentUser.phone, publisherId: currentUserId, timestamp: Date.now(), completed: false });
            modal.remove(); showToast("✅ تم النشر! 🎾"); if(activeTab==="home") renderHomeTab();
        });
        document.getElementById("clubName").focus();
    }

    function logout() {
        localStorage.clear(); currentUser = null; currentUserId = null;
        if(notificationListener) notificationListener(); if(chatsListener) chatsListener(); if(completedAnnouncementsListener) completedAnnouncementsListener();
        if(countdownInterval) clearInterval(countdownInterval); countdownInterval = null; completedAnnouncementsListener = null;
        showRegisterCard();
    }

    function bindTabs() {
        document.querySelectorAll('.tab-item').forEach(btn => btn.addEventListener('click', (e) => { activeTab = btn.dataset.tab; renderCurrentTab(); }));
    }

    async function initApp() {
        currentUserId = localStorage.getItem('tennisApp_userId');
        if (currentUserId) { const snap = await get(child(ref(db, "users"), currentUserId)); if(snap.exists()) { currentUser = snap.val(); showMainApp(); bindTabs(); return; } }
        showRegisterCard(); bindTabs();
    }
    initApp();
</script>
</body>
</html>
