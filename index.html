<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>منصة النوادي | مشاركة المواعيد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1a 0%, #0c1119 100%);
            padding: 20px;
        }

        /* الحاوية الرئيسية */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* الكارد العام */
        .card {
            background: rgba(18, 25, 20, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 28px 24px;
            border: 2px solid #2ecc71;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.3);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .card h2 {
            color: #2ecc71;
            font-size: 26px;
            margin-bottom: 8px;
            text-align: center;
        }

        .card p {
            color: #b8f2c2;
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            color: #c0f0c8;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.55);
            border: 1.5px solid #2ecc71;
            border-radius: 20px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            border-color: #3aff8c;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
            background: rgba(0, 0, 0, 0.7);
        }

        input::placeholder, textarea::placeholder {
            color: #8aa88e;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(95deg, #1f8a4c, #2ecc71);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.25s;
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }

        button:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #2ecc71, #3ae288);
            box-shadow: 0 6px 18px rgba(46, 204, 113, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(95deg, #2c3e50, #34495e);
            box-shadow: none;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: linear-gradient(95deg, #3e5a6f, #4a6a80);
        }

        /* رسالة التهاني */
        .congrats {
            text-align: center;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .congrats h1 {
            font-size: 32px;
            color: #2ecc71;
            margin-bottom: 15px;
        }

        .congrats p {
            font-size: 18px;
            color: #f1c40f;
        }

        /* المنشورات */
        .posts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .posts-header h3 {
            color: #2ecc71;
            font-size: 20px;
        }

        .btn-add {
            background: linear-gradient(95deg, #e67e22, #f39c12);
            padding: 10px 18px;
            font-size: 14px;
            width: auto;
            margin-top: 0;
        }

        .post-item {
            background: rgba(0, 0, 0, 0.4);
            border-right: 4px solid #2ecc71;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            transition: 0.2s;
        }

        .post-item h4 {
            color: #f39c12;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .post-item p {
            color: #ddd;
            margin: 5px 0;
            text-align: right;
        }

        .post-time {
            font-size: 13px;
            color: #2ecc71;
            margin-top: 8px;
        }

        .empty-posts {
            text-align: center;
            padding: 30px;
            color: #8aa88e;
        }

        /* مودال إضافة منشور */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: rgba(20, 28, 22, 0.98);
            backdrop-filter: blur(20px);
            width: 90%;
            max-width: 400px;
            border-radius: 32px;
            padding: 28px 22px;
            border: 2px solid #2ecc71;
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.4);
        }

        .modal-content h3 {
            color: #2ecc71;
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
            margin-top: 0;
        }

        .cancel-modal {
            background: linear-gradient(95deg, #4a5568, #2d3748);
        }

        .small-note {
            font-size: 12px;
            color: #8bc34a;
            text-align: center;
            margin-top: 15px;
            opacity: 0.7;
        }

        .logout-area {
            text-align: center;
            margin-top: 20px;
        }

        .logout-btn {
            background: rgba(200, 60, 60, 0.8);
            width: auto;
            padding: 10px 24px;
            font-size: 14px;
            display: inline-block;
            width: auto;
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, get, push, onValue, child } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBT-WCUAI7QO2IlcF3eQlJOSrTOQN_52vU",
            authDomain: "pcon-f6efd.firebaseapp.com",
            databaseURL: "https://pcon-f6efd-default-rtdb.firebaseio.com",
            projectId: "pcon-f6efd",
            storageBucket: "pcon-f6efd.firebasestorage.app",
            messagingSenderId: "971596240948",
            appId: "1:971596240948:web:9abf2f64a84be34521d261"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // مراجع Firebase
        const userDataRef = ref(db, "userProfile");      // بيانات المستخدم (اسم + عمر + موبايل)
        const postsRef = ref(db, "allPosts");             // كل المنشورات

        let currentUser = null;   // يخزن بيانات المستخدم الحالي

        // =============== دالة عرض كارد التسجيل ===============
        function showRegisterCard() {
            document.getElementById("appContainer").innerHTML = `
                <div class="card">
                    <h2>✨ مرحباً بك ✨</h2>
                    <p>سجل بياناتك للمشاركة والتفاعل</p>
                    <div class="input-group">
                        <label>👤 الاسم الكامل</label>
                        <input type="text" id="userName" placeholder="مثال: علي محمد" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>📅 العمر</label>
                        <input type="number" id="userAge" placeholder="مثال: 25" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>📱 رقم الموبايل</label>
                        <input type="tel" id="userPhone" placeholder="05xxxxxxxx" autocomplete="off">
                    </div>
                    <button id="registerBtn">✅ موافق</button>
                    <div class="small-note">🔐 بياناتك آمنة ومشفرة</div>
                </div>
            `;

            document.getElementById("registerBtn").addEventListener("click", async () => {
                const name = document.getElementById("userName").value.trim();
                const age = document.getElementById("userAge").value.trim();
                const phone = document.getElementById("userPhone").value.trim();

                if (!name || !age || !phone) {
                    alert("❌ الرجاء ملء جميع الحقول");
                    return;
                }

                if (isNaN(age) || age < 1 || age > 120) {
                    alert("❌ عمر غير صحيح");
                    return;
                }

                // حفظ بيانات المستخدم في Firebase
                const userProfile = { name, age, phone, registeredAt: new Date().toISOString() };
                await set(userDataRef, userProfile);
                currentUser = userProfile;

                // بعد التسجيل نعرض رسالة التهاني + المنشورات
                showMainApp();
            });
        }

        // =============== عرض واجهة الترحيب + المنشورات ===============
        function showMainApp() {
            if (!currentUser) return;

            const container = document.getElementById("appContainer");
            container.innerHTML = `
                <div class="card congrats">
                    <h1>🎉 مبروك ${currentUser.name} 🎉</h1>
                    <p>✨ تم تسجيل دخولك بنجاح إلى منصة النوادي ✨</p>
                    <p style="font-size: 14px; margin-top: 10px;">📢 الآن يمكنك إضافة منشورات ومشاهدة مواعيد النوادي</p>
                </div>

                <div class="card">
                    <div class="posts-header">
                        <h3>📋 المنشورات (مواعيد النوادي)</h3>
                        <button id="addPostBtn" class="btn-add">➕ إضافة منشور</button>
                    </div>
                    <div id="postsList">
                        <div class="empty-posts">⏳ جاري تحميل المنشورات...</div>
                    </div>
                </div>

                <div class="logout-area">
                    <button id="logoutBtn" class="logout-btn">🚪 تسجيل خروج / تغيير الحساب</button>
                </div>
            `;

            // تحميل المنشورات فوراً
            loadAllPosts();

            // زر إضافة منشور
            document.getElementById("addPostBtn").addEventListener("click", () => {
                openAddPostModal();
            });

            // زر تسجيل الخروج
            document.getElementById("logoutBtn").addEventListener("click", async () => {
                // مسح بيانات المستخدم من Firebase (اختياري) أو فقط نخلي currentUser = null
                // الأفضل نحذف userProfile عشان أول مرة يسجل تاني
                await set(userDataRef, null);
                currentUser = null;
                showRegisterCard();
            });
        }

        // =============== تحميل كل المنشورات وعرضها ===============
        function loadAllPosts() {
            const postsListDiv = document.getElementById("postsList");
            if (!postsListDiv) return;

            // استماع مباشر للتغييرات (real-time)
            onValue(postsRef, (snapshot) => {
                const posts = snapshot.val();
                if (!posts || Object.keys(posts).length === 0) {
                    postsListDiv.innerHTML = `<div class="empty-posts">📭 لا توجد منشورات حالياً... كن أول من يضيف منشوراً! ✨</div>`;
                    return;
                }

                // تحويل الكائن إلى مصفوفة وعرضها (الأحدث أولاً)
                let postsArray = Object.entries(posts).map(([id, data]) => ({ id, ...data }));
                postsArray.reverse(); // الأحدث أولاً

                let html = '';
                for (let post of postsArray) {
                    html += `
                        <div class="post-item">
                            <h4>⚽ ${escapeHtml(post.clubName) || 'نادي غير محدد'}</h4>
                            <p>🕐 الوقت: ${escapeHtml(post.time) || 'غير محدد'}</p>
                            <p>👤 بواسطة: ${escapeHtml(post.publisherName) || 'مستخدم'}</p>
                            <div class="post-time">📅 ${new Date(post.timestamp).toLocaleString('ar-EG')}</div>
                        </div>
                    `;
                }
                postsListDiv.innerHTML = html;
            }, (error) => {
                console.error("خطأ في تحميل المنشورات:", error);
                postsListDiv.innerHTML = `<div class="empty-posts">⚠️ حدث خطأ في تحميل المنشورات</div>`;
            });
        }

        // =============== فتح مودال إضافة منشور ===============
        function openAddPostModal() {
            // إنشاء المودال وإضافته للجسم
            const modal = document.createElement("div");
            modal.className = "modal";
            modal.id = "postModal";
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>➕ منشور جديد</h3>
                    <div class="input-group">
                        <label>🏟️ اسم النادي</label>
                        <input type="text" id="clubName" placeholder="مثال: النادي الأهلي" autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>⏰ الساعة / المعاد</label>
                        <input type="text" id="eventTime" placeholder="مثال: 8:00 مساءً - الجمعة" autocomplete="off">
                    </div>
                    <div class="modal-buttons">
                        <button id="cancelPostBtn" class="cancel-modal">❌ إلغاء</button>
                        <button id="publishPostBtn">📢 نشر</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            modal.style.display = "flex";

            const clubInput = document.getElementById("clubName");
            const timeInput = document.getElementById("eventTime");
            const cancelBtn = document.getElementById("cancelPostBtn");
            const publishBtn = document.getElementById("publishPostBtn");

            cancelBtn.addEventListener("click", () => {
                modal.remove();
            });

            publishBtn.addEventListener("click", async () => {
                const clubName = clubInput.value.trim();
                const eventTime = timeInput.value.trim();

                if (!clubName || !eventTime) {
                    alert("❌ الرجاء إدخال اسم النادي والمعاد");
                    return;
                }

                // إنشاء منشور جديد في Firebase
                const newPost = {
                    clubName: clubName,
                    time: eventTime,
                    publisherName: currentUser.name,
                    publisherPhone: currentUser.phone,
                    timestamp: Date.now()
                };

                try {
                    await push(postsRef, newPost);
                    modal.remove();
                    // إظهار رسالة نجاح بسيطة
                    alert("✅ تم نشر المنشور بنجاح! الجميع سيراه الآن.");
                } catch (error) {
                    console.error("خطأ في النشر:", error);
                    alert("❌ حدث خطأ أثناء النشر، حاول مرة أخرى");
                }
            });
        }

        // =============== دالة الحماية من XSS ===============
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // =============== بدء التشغيل: التحقق من وجود مستخدم مسجل ===============
        async function initApp() {
            const snapshot = await get(userDataRef);
            if (snapshot.exists()) {
                currentUser = snapshot.val();
                // التحقق من أن البيانات كاملة
                if (currentUser.name && currentUser.age && currentUser.phone) {
                    showMainApp();
                } else {
                    showRegisterCard();
                }
            } else {
                showRegisterCard();
            }
        }

        // تشغيل التطبيق
        initApp();
    </script>
</body>
</html>
