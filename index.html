<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>منصة نوادي التنس | تواصل ولعب</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            color: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 16px 12px 80px 12px;
            scroll-behavior: smooth;
        }

        /* ✨ تصميم Dock شفاف بحواف لامعة رقيقة - ثيم التنس ✨ */
        .bottom-tab-bar {
            position: fixed;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(10, 10, 18, 0.35);
            border-radius: 28px;
            border: 1px solid rgba(100, 220, 180, 0.45);
            box-shadow:
                0 0 0 1px rgba(180, 120, 255, 0.25),
                0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(100, 220, 180, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 16px 14px;
            z-index: 100;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            max-width: 420px;
            margin: 0 auto;
            animation: subtleGlow 4s ease-in-out infinite;
        }

        @keyframes subtleGlow {
            0%, 100% {
                box-shadow:
                    0 0 0 1px rgba(180, 120, 255, 0.25),
                    0 8px 32px rgba(0, 0, 0, 0.5),
                    0 0 20px rgba(100, 220, 180, 0.15),
                    inset 0 1px 0 rgba(255, 255, 255, 0.08);
            }
            50% {
                box-shadow:
                    0 0 0 1px rgba(180, 120, 255, 0.45),
                    0 8px 32px rgba(0, 0, 0, 0.5),
                    0 0 28px rgba(100, 220, 180, 0.28),
                    inset 0 1px 0 rgba(255, 255, 255, 0.15);
            }
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            padding: 4px;
            border-radius: 16px;
        }
        .tab-item:hover {
            background: rgba(100, 220, 180, 0.12);
            transform: translateY(-2px);
        }
        .tab-item.active {
            color: #64dcb4;
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            width: 24px;
            height: 3px;
            background: linear-gradient(90deg, #64dcb4, #b478ff);
            border-radius: 3px;
            animation: pulseLine 2s ease-in-out infinite;
        }
        @keyframes pulseLine {
            0%, 100% { opacity: 0.7; transform: scaleX(0.9); }
            50% { opacity: 1; transform: scaleX(1); }
        }
        .tab-icon-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            filter: brightness(0.85) drop-shadow(0 0 3px rgba(100, 220, 180, 0.4));
            transition: all 0.3s ease;
        }
        .tab-item.active .tab-icon-img,
        .tab-item:hover .tab-icon-img {
            filter: brightness(1.25) drop-shadow(0 0 10px rgba(100, 220, 180, 0.7));
            transform: scale(1.08);
        }

        .badge-count {
            position: absolute;
            top: -4px;
            right: -6px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 50%;
            min-width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 0.5s ease, float 3s ease-in-out infinite;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 2px 8px rgba(238, 90, 90, 0.5);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-2px) scale(1.05); }
        }

        /* ✨ بطاقة الإعلان المكتمل - جديدة ✨ */
        .completed-announcement {
            background: linear-gradient(145deg, rgba(30, 50, 45, 0.95), rgba(20, 35, 30, 0.98));
            border-radius: 24px;
            margin: 0 0 20px 0;
            padding: 20px;
            border: 2px solid rgba(100, 220, 180, 0.6);
            position: relative;
            overflow: hidden;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 30px rgba(100, 220, 180, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideDown 0.4s ease, glowPulse 3s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow:
                    0 8px 32px rgba(0, 0, 0, 0.5),
                    0 0 30px rgba(100, 220, 180, 0.25),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
            50% {
                box-shadow:
                    0 8px 32px rgba(0, 0, 0, 0.5),
                    0 0 45px rgba(100, 220, 180, 0.45),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
            }
        }

        .completed-announcement::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #64dcb4, #b478ff, #64dcb4, #b478ff);
            background-size: 300% 100%;
            animation: gradientMove 3s linear infinite;
            opacity: 0.9;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .completed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(100, 220, 180, 0.3);
        }

        .completed-title {
            color: #64dcb4;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .completed-title::before {
            content: '🎉';
            font-size: 20px;
            animation: bounce 1.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .completed-badge {
            background: linear-gradient(135deg, #64dcb4, #4dd0c0);
            color: #0a1a15;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 3px 12px rgba(100, 220, 180, 0.4);
        }

        .completed-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #ddd;
        }

        .detail-item strong {
            color: #64dcb4;
            font-weight: 600;
        }

        .completed-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .chat-team-btn {
            background: linear-gradient(135deg, #64dcb4 0%, #4dd0c0 100%);
            border: none;
            padding: 12px 20px;
            border-radius: 28px;
            font-weight: 700;
            color: #0a1a15;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(100, 220, 180, 0.45);
            flex: 1;
            min-width: 120px;
            justify-content: center;
        }

        .chat-team-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 6px 28px rgba(100, 220, 180, 0.65);
        }

        .view-details-btn {
            background: rgba(30, 30, 50, 0.8);
            border: 1.5px solid rgba(100, 220, 180, 0.4);
            padding: 12px 20px;
            border-radius: 28px;
            font-weight: 600;
            color: #64dcb4;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 120px;
            justify-content: center;
        }

        .view-details-btn:hover {
            background: rgba(100, 220, 180, 0.15);
            transform: translateY(-2px);
            border-color: #64dcb4;
        }

        .players-avatars {
            display: flex;
            gap: -8px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(100, 220, 180, 0.2);
        }

        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #64dcb4, #b478ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #0a1a15;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-left: -8px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .player-avatar:first-child {
            margin-left: 0;
        }

        .player-avatar:hover {
            transform: scale(1.15) translateY(-3px);
            z-index: 5;
            box-shadow: 0 4px 16px rgba(100, 220, 180, 0.5);
        }

        .player-avatar.plus {
            background: rgba(100, 220, 180, 0.2);
            border-color: rgba(100, 220, 180, 0.4);
            color: #64dcb4;
            font-size: 12px;
        }

        /* بطاقات المنشورات العادية */
        .post-card {
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.9), rgba(18, 18, 34, 0.95));
            border-radius: 22px;
            margin-bottom: 16px;
            padding: 18px;
            border: 1px solid rgba(100, 220, 180, 0.2);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, #64dcb4, #b478ff, #64dcb4);
            opacity: 0.7;
        }
        .post-card:hover {
            transform: translateY(-3px);
            border-color: rgba(100, 220, 180, 0.45);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4), 0 0 20px rgba(100, 220, 180, 0.1);
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(100, 220, 180, 0.15);
        }
        .club-name {
            color: #64dcb4;
            font-size: 19px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .post-time {
            font-size: 11px;
            color: #888;
            background: rgba(100, 220, 180, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
        }
        .post-detail {
            color: #ddd;
            margin: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .countdown-section {
            background: rgba(100, 220, 180, 0.12);
            border-radius: 16px;
            padding: 10px 14px;
            margin: 12px 0 8px 0;
            font-size: 13px;
            font-weight: 700;
            color: #64dcb4;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(100, 220, 180, 0.3);
        }

        .ready-btn-new {
            background: linear-gradient(135deg, #64dcb4 0%, #4dd0c0 50%, #64dcb4 100%);
            border: none;
            padding: 13px;
            border-radius: 42px;
            font-weight: 700;
            color: #0a1a15;
            width: 100%;
            margin-top: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 14px;
            box-shadow:
                0 4px 20px rgba(100, 220, 180, 0.45),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .ready-btn-new::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        .ready-btn-new:hover::before {
            left: 100%;
        }
        .ready-btn-new:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow:
                0 6px 28px rgba(100, 220, 180, 0.65),
                0 0 0 1px rgba(255, 255, 255, 0.2);
        }
        .ready-btn-new:active {
            transform: translateY(-1px) scale(0.99);
        }

        .approved-badge {
            background: linear-gradient(135deg, #64dcb4, #4dd0c0);
            color: #0a1a15;
            padding: 12px;
            border-radius: 42px;
            font-weight: 700;
            text-align: center;
            width: 100%;
            margin-top: 14px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 18px rgba(100, 220, 180, 0.35);
        }
        .approved-badge:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 24px rgba(100, 220, 180, 0.55);
        }

        .cancel-ready-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border: none;
            padding: 9px;
            border-radius: 32px;
            font-weight: 700;
            color: white;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            box-shadow: 0 3px 12px rgba(238, 90, 90, 0.35);
        }
        .cancel-ready-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 18px rgba(238, 90, 90, 0.55);
        }

        .ready-count-badge {
            background: linear-gradient(135deg, rgba(100, 220, 180, 0.2), rgba(180, 120, 255, 0.2));
            color: #64dcb4;
            padding: 5px 14px;
            border-radius: 22px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid rgba(100, 220, 180, 0.35);
        }

        .ready-users-list {
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid rgba(100, 220, 180, 0.15);
        }
        .ready-user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(30, 30, 50, 0.7);
            border-radius: 14px;
            margin-bottom: 10px;
            border: 1px solid rgba(100, 220, 180, 0.1);
            transition: all 0.2s ease;
        }
        .ready-user-item:hover {
            background: rgba(40, 40, 65, 0.9);
            border-color: rgba(100, 220, 180, 0.3);
        }

        .approve-btn {
            background: linear-gradient(135deg, #64dcb4, #4dd0c0);
            border: none;
            padding: 7px 14px;
            border-radius: 22px;
            color: #0a1a15;
            font-weight: 700;
            cursor: pointer;
            margin-left: 8px;
            font-size: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(100, 220, 180, 0.3);
        }
        .approve-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 14px rgba(100, 220, 180, 0.5);
        }
        .reject-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            padding: 7px 14px;
            border-radius: 22px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(238, 90, 90, 0.3);
        }
        .reject-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 14px rgba(238, 90, 90, 0.5);
        }

        .waiting-badge {
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.2), rgba(230, 126, 34, 0.2));
            color: #f39c12;
            padding: 5px 12px;
            border-radius: 22px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(243, 156, 18, 0.35);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 16, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.98), rgba(18, 18, 34, 0.98));
            width: 92%;
            max-width: 450px;
            border-radius: 30px;
            padding: 26px 22px;
            border: 1px solid rgba(100, 220, 180, 0.35);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(180, 120, 255, 0.2),
                0 0 40px rgba(100, 220, 180, 0.15);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .chat-modal-content {
            height: 85vh;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            padding: 18px;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 14px 6px;
            scrollbar-width: thin;
            scrollbar-color: rgba(100, 220, 180, 0.4) transparent;
        }
        .messages-container::-webkit-scrollbar {
            width: 5px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(100, 220, 180, 0.4);
            border-radius: 10px;
        }
        .message {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 24px;
            font-size: 14px;
            word-wrap: break-word;
            position: relative;
            line-height: 1.4;
            animation: messageIn 0.2s ease;
        }
        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .my-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #64dcb4, #4dd0c0);
            color: #0a1a15;
            border-bottom-right-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .other-message {
            align-self: flex-start;
            background: rgba(38, 38, 58, 0.9);
            color: #efefef;
            border-bottom-left-radius: 6px;
            border: 1px solid rgba(100, 220, 180, 0.15);
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 26px;
            padding: 20px;
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.7), rgba(18, 18, 34, 0.8));
            border-radius: 26px;
            border: 1px solid rgba(100, 220, 180, 0.2);
        }
        .avatar {
            background: linear-gradient(135deg, #64dcb4 0%, #b478ff 50%, #64dcb4 100%);
            width: 84px;
            height: 84px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #0a1a15;
            border: 3px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 25px rgba(100, 220, 180, 0.35);
            animation: avatarGlow 3s ease-in-out infinite;
        }
        @keyframes avatarGlow {
            0%, 100% { box-shadow: 0 8px 25px rgba(100, 220, 180, 0.35); }
            50% { box-shadow: 0 8px 35px rgba(180, 120, 255, 0.55); }
        }
        .stats-row {
            display: flex;
            justify-content: space-around;
            background: rgba(30, 30, 50, 0.7);
            border-radius: 30px;
            padding: 14px;
            margin: 18px 0;
            border: 1px solid rgba(100, 220, 180, 0.15);
        }
        .stat {
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 10px;
            border-radius: 18px;
        }
        .stat:hover {
            background: rgba(100, 220, 180, 0.12);
            transform: translateY(-2px);
        }
        .stat-number {
            font-size: 22px;
            font-weight: 700;
            color: #64dcb4;
            text-shadow: 0 0 10px rgba(100, 220, 180, 0.4);
        }

        .btn-primary {
            background: linear-gradient(135deg, #64dcb4 0%, #4dd0c0 100%);
            border: none;
            padding: 14px;
            border-radius: 44px;
            font-weight: 700;
            color: #0a1a15;
            width: 100%;
            margin-top: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            box-shadow: 0 5px 22px rgba(100, 220, 180, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(100, 220, 180, 0.6);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #64dcb4;
            color: #64dcb4;
            padding: 12px;
            border-radius: 44px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .btn-outline:hover {
            background: rgba(100, 220, 180, 0.12);
            transform: translateY(-2px);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            padding: 12px;
            border-radius: 44px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(238, 90, 90, 0.35);
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(238, 90, 90, 0.55);
        }

        input, textarea, select {
            background: rgba(30, 30, 50, 0.8);
            border: 1.5px solid rgba(100, 220, 180, 0.25);
            padding: 14px 18px;
            border-radius: 24px;
            color: white;
            width: 100%;
            margin-bottom: 14px;
            font-size: 14px;
            transition: all 0.2s ease;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #64dcb4;
            box-shadow: 0 0 0 3px rgba(100, 220, 180, 0.2);
            background: rgba(35, 35, 58, 0.95);
        }
        input::placeholder, textarea::placeholder {
            color: #777;
        }

        .empty-state {
            text-align: center;
            color: #777;
            padding: 40px 20px;
            background: rgba(30, 30, 50, 0.4);
            border-radius: 24px;
            border: 1px dashed rgba(100, 220, 180, 0.2);
        }
        .empty-state span {
            color: #64dcb4;
            font-weight: 600;
        }

        .toast-message {
            position: fixed;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #64dcb4, #4dd0c0);
            color: #0a1a15;
            padding: 14px 28px;
            border-radius: 44px;
            font-weight: 700;
            z-index: 1100;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
            box-shadow:
                0 6px 25px rgba(100, 220, 180, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.2);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
            to { opacity: 0; transform: translateX(-50%) translateY(-15px) scale(0.95); visibility: hidden; }
        }

        .message-preview {
            background: rgba(20, 40, 35, 0.8);
            border-radius: 18px;
            padding: 14px;
            margin-top: 14px;
            border-right: 3px solid #64dcb4;
            border-left: 2px solid rgba(180, 120, 255, 0.3);
        }
        .message-preview p {
            color: #ddd;
            font-size: 13px;
            line-height: 1.5;
        }
        .message-preview p[style*="color:#2ecc71"] {
            color: #64dcb4 !important;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .small-btn {
            padding: 9px 18px;
            font-size: 12px;
            border-radius: 28px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .small-btn:hover {
            transform: translateY(-2px);
        }

        .select-item {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            padding: 10px;
            border-radius: 16px;
            transition: all 0.2s ease;
            margin-bottom: 8px;
        }
        .select-item:hover {
            background: rgba(30, 30, 50, 0.7);
            transform: translateX(3px);
        }

        .select-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #64dcb4;
            border: 2px solid rgba(100, 220, 180, 0.4);
            border-radius: 6px;
        }

        .delete-selected-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            padding: 9px 18px;
            border-radius: 28px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-right: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 3px 12px rgba(238, 90, 90, 0.3);
        }
        .delete-selected-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 18px rgba(238, 90, 90, 0.5);
        }

        .select-all-btn {
            background: linear-gradient(135deg, #5dade2, #3498db);
            border: none;
            padding: 9px 18px;
            border-radius: 28px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 3px 12px rgba(52, 152, 219, 0.3);
        }
        .select-all-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 18px rgba(52, 152, 219, 0.5);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* تحسينات إضافية للثيم */
        ::selection {
            background: rgba(100, 220, 180, 0.35);
            color: white;
        }

        /* تأثيرات تحميل ناعمة */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(100, 220, 180, 0.3);
            border-radius: 50%;
            border-top-color: #64dcb4;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .bottom-tab-bar {
                bottom: 10px;
                left: 10px;
                right: 10px;
                padding: 8px 12px 12px;
            }
            .tab-icon-img {
                width: 26px;
                height: 26px;
            }
            .post-card {
                padding: 14px;
                border-radius: 20px;
            }
            .modal-content {
                width: 95%;
                padding: 22px 18px;
                border-radius: 26px;
            }
            .completed-announcement {
                padding: 16px;
                margin: 0 0 16px 0;
            }
            .completed-details {
                grid-template-columns: 1fr;
            }
            .completed-actions {
                flex-direction: column;
            }
            .chat-team-btn, .view-details-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper" id="appContainer"></div>

<!-- 🎾 شريط التنقل السفلي - تصميم شفاف بحواف لامعة 🎾 -->
<div class="bottom-tab-bar" id="tabBar" style="display: none;">
    <button class="tab-item" data-tab="home" title="الرئيسية">
        <img src="hom.png" class="tab-icon-img" alt="🏠" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%2364dcb4%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z%22/%3E%3C/svg%3E'">
    </button>
    <button class="tab-item" data-tab="chats" id="chatsTab" title="الدردشات">
        <div style="position: relative;">
            <img src="chat.png" class="tab-icon-img" alt="💬" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%2364dcb4%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2z%22/%3E%3C/svg%3E'">
            <span id="chatsBadge" class="badge-count" style="display:none;">0</span>
        </div>
    </button>
    <button class="tab-item" data-tab="notifications" id="notificationsTab" title="الإشعارات">
        <div style="position: relative;">
            <img src="not.png" class="tab-icon-img" alt="🔔" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%2364dcb4%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.93 6 11v5l-2 2v1h16v-1l-2-2z%22/%3E%3C/svg%3E'">
            <span id="notifBadge" class="badge-count" style="display:none;">0</span>
        </div>
    </button>
    <button class="tab-item" data-tab="profile" title="الملف الشخصي">
        <img src="pro.png" class="tab-icon-img" alt="👤" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22%2364dcb4%22 viewBox=%220 0 24 24%22%3E%3Cpath d=%22M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z%22/%3E%3C/svg%3E'">
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set, get, push, onValue, child, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBT-WCUAI7QO2IlcF3eQlJOSrTOQN_52vU",
        authDomain: "pcon-f6efd.firebaseapp.com",
        databaseURL: "https://pcon-f6efd-default-rtdb.firebaseio.com",
        projectId: "pcon-f6efd",
        storageBucket: "pcon-f6efd.firebasestorage.app",
        messagingSenderId: "971596240948",
        appId: "1:971596240948:web:9abf2f64a84be34521d261"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentUser = null;
    let currentUserId = null;
    let activeTab = "home";
    let unreadNotificationsCount = 0;
    let unreadMessagesCount = 0;
    let notificationListener = null;
    let chatsListener = null;
    let countdownInterval = null;
    let completedAnnouncementsListener = null;

    /** 🔥 دالة جديدة: تحويل مستوى التنس إلى رقم للمقارنة */
    function getLevelValue(level) {
        if (!level) return 0;
        const levelMap = {
            'مبتدئ': 1,
            'أقل من متوسط': 2,
            'متوسط': 3,
            'أعلى من متوسط': 4,
            'محترف': 5
        };
        return levelMap[level] || 0;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function showToast(msg) {
        const existing = document.querySelector('.toast-message');
        if (existing) existing.remove();
   
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    function showTabBar() {
        document.getElementById("tabBar").style.display = "flex";
    }

    function hideTabBar() {
        document.getElementById("tabBar").style.display = "none";
    }

    function updateNotificationsBadge() {
        const badge = document.getElementById('notifBadge');
        if (unreadNotificationsCount > 0) {
            badge.textContent = unreadNotificationsCount > 99 ? '99+' : unreadNotificationsCount;
            badge.style.display = 'flex';
        } else {
            badge.style.display = 'none';
        }
    }

    function updateChatsBadge() {
        const badge = document.getElementById('chatsBadge');
        if (unreadMessagesCount > 0) {
            badge.textContent = unreadMessagesCount > 99 ? '99+' : unreadMessagesCount;
            badge.style.display = 'flex';
        } else {
            badge.style.display = 'none';
        }
    }

    function loadUnreadNotificationsCount() {
        if (!currentUserId) return;
        if (notificationListener) notificationListener();
        notificationListener = onValue(ref(db, `notifications/${currentUserId}`), (snapshot) => {
            const notifs = snapshot.val() || {};
            let count = 0;
            Object.values(notifs).forEach(notif => { if (!notif.read) count++; });
            unreadNotificationsCount = count;
            updateNotificationsBadge();
        });
    }

    function loadUnreadMessagesCount() {
        if (!currentUserId) return;
        if (chatsListener) chatsListener();
        chatsListener = onValue(ref(db, `userChats/${currentUserId}`), async (snapshot) => {
            const entries = snapshot.val() || {};
            let totalUnread = 0;
            for (const [chatId, chatData] of Object.entries(entries)) {
                const lastReadSnap = await get(ref(db, `userChats/${currentUserId}/${chatId}/lastRead`));
                const lastRead = lastReadSnap.val() || 0;
                const messagesSnap = await get(ref(db, `chats/${chatId}/messages`));
                const messages = messagesSnap.val() || {};
                Object.values(messages).forEach(msg => {
                    if (msg.senderId !== currentUserId && msg.timestamp > lastRead) totalUnread++;
                });
            }
            unreadMessagesCount = totalUnread;
            updateChatsBadge();
        });
    }

    async function updateLastRead(chatId) {
        await set(ref(db, `userChats/${currentUserId}/${chatId}/lastRead`), Date.now());
        loadUnreadMessagesCount();
    }

    async function markAllNotificationsAsRead() {
        if (!currentUserId) return;
        const notifsRef = ref(db, `notifications/${currentUserId}`);
        const snapshot = await get(notifsRef);
        const notifs = snapshot.val() || {};
        const updates = {};
        Object.keys(notifs).forEach(id => { if (!notifs[id].read) updates[`notifications/${currentUserId}/${id}/read`] = true; });
        if (Object.keys(updates).length > 0) await update(ref(db), updates);
    }

    function updateAllCountdowns() {
        const now = Date.now();
        document.querySelectorAll('.post-card').forEach(card => {
            const countdownSection = card.querySelector('.countdown-section');
            if (!countdownSection) return;
          
            const eventTs = parseInt(countdownSection.dataset.eventTimestamp);
            if (!eventTs) return;
            const diff = eventTs - now;
            if (diff < 7200000) {
                card.style.display = 'none';
                return;
            } else {
                card.style.display = '';
            }
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const timeSpan = countdownSection.querySelector('.time-remaining');
            if (timeSpan) {
                timeSpan.textContent = `${hours} ساعة و ${minutes} دقيقة`;
            }
        });
    }

    /** 🔥 دالة تأكيد تسجيل الخروج - مربع جميل وهادئ (بدل alert) */
    function showLogoutConfirmModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `
            <div class="modal-content" style="max-width:380px; text-align:center; padding:32px 24px;">
                <div style="font-size:52px; margin-bottom:20px; animation: float 2s ease-in-out infinite;">🚪</div>
                <h3 style="color:#64dcb4; margin-bottom:14px; font-size:22px;">هل حقًا تريد تسجيل الخروج؟</h3>
                <p style="color:#aaa; margin-bottom:32px; font-size:15px; line-height:1.5;">سيتم مسح بيانات تسجيل الدخول<br>وسيتعين عليك تسجيل الدخول مرة أخرى</p>
                <div style="display:flex; gap:16px;">
                    <button id="cancelLogoutBtn" class="btn-outline" style="flex:1; padding:16px;">لا، إلغاء</button>
                    <button id="confirmLogoutBtn" class="btn-danger" style="flex:1; padding:16px;">نعم، تسجيل خروج</button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        document.getElementById("cancelLogoutBtn").addEventListener("click", () => modal.remove());
        document.getElementById("confirmLogoutBtn").addEventListener("click", () => {
            modal.remove();
            logout();
        });
    }

    /** 🔥 دالة تعديل البيانات - كارد جميل يسمح بتعديل الاسم والعمر والرقم والمستوى */
    function showEditProfileModal() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="margin-bottom:24px; color:#64dcb4; text-align:center; display:flex; align-items:center; justify-content:center; gap:8px;">
                    <span>✏️</span> تعديل بياناتك الشخصية
                </h3>
                <input type="text" id="editName" value="${escapeHtml(currentUser.name)}" placeholder="الاسم الكامل" style="text-align:center;">
                <input type="number" id="editAge" value="${currentUser.age}" placeholder="العمر" style="text-align:center;">
                <input type="tel" id="editPhone" value="${currentUser.phone}" placeholder="رقم الموبايل" style="text-align:center;">
                <select id="editTennisLevel" style="text-align:center;">
                    <option value="مبتدئ" ${currentUser.tennisLevel === 'مبتدئ' ? 'selected' : ''}>مبتدئ</option>
                    <option value="أقل من متوسط" ${currentUser.tennisLevel === 'أقل من متوسط' ? 'selected' : ''}>أقل من متوسط</option>
                    <option value="متوسط" ${currentUser.tennisLevel === 'متوسط' ? 'selected' : ''}>متوسط</option>
                    <option value="أعلى من متوسط" ${currentUser.tennisLevel === 'أعلى من متوسط' ? 'selected' : ''}>أعلى من متوسط</option>
                    <option value="محترف" ${currentUser.tennisLevel === 'محترف' ? 'selected' : ''}>محترف</option>
                </select>
                <div style="display:flex; gap:14px; margin-top:24px;">
                    <button id="cancelEditBtn" class="btn-outline" style="flex:1;">إلغاء</button>
                    <button id="saveEditBtn" class="btn-primary" style="flex:1;">💾 حفظ التعديلات</button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        document.getElementById("cancelEditBtn").addEventListener("click", () => modal.remove());
        document.getElementById("saveEditBtn").addEventListener("click", async () => {
            const newName = document.getElementById("editName").value.trim();
            const newAge = document.getElementById("editAge").value.trim();
            const newPhone = document.getElementById("editPhone").value.trim();
            const newLevel = document.getElementById("editTennisLevel").value;
            if (!newName || !newAge || !newPhone || !newLevel) {
                alert("❌ الرجاء ملء جميع الحقول");
                return;
            }
            if (isNaN(newAge) || newAge < 1) {
                alert("❌ عمر غير صحيح");
                return;
            }
            // تحديث Firebase
            await update(ref(db, `users/${currentUserId}`), {
                name: newName,
                age: newAge,
                phone: newPhone,
                tennisLevel: newLevel
            });
            // تحديث المتغيرات المحلية والـ localStorage
            currentUser.name = newName;
            currentUser.age = newAge;
            currentUser.phone = newPhone;
            currentUser.tennisLevel = newLevel;
            localStorage.setItem('tennisApp_user', JSON.stringify(currentUser));
            showToast("✅ تم حفظ التعديلات بنجاح!");
            modal.remove();
            renderProfileTab(); // تحديث الصفحة الشخصية فورًا
        });
    }

    function showRegisterCard() {
        hideTabBar();
        document.getElementById("appContainer").innerHTML = `
            <div style="display:flex; justify-content:center; align-items:center; min-height:80vh; padding:20px;">
                <div style="background:linear-gradient(145deg, rgba(26,26,46,0.95), rgba(18,18,34,0.98)); border-radius:34px; padding:36px 28px; width:100%; max-width:420px; border:1.5px solid rgba(100,220,180,0.4); box-shadow:0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(100,220,180,0.15);">
                    <div style="text-align:center; margin-bottom:24px;">
                        <div style="font-size:48px; margin-bottom:12px;">🎾</div>
                        <h2 style="color:#64dcb4; font-size:24px;">مرحباً بك في منصة التنس</h2>
                        <p style="color:#aaa; margin-top:8px; font-size:14px;">سجل بياناتك للعب والتنسيق مع اللاعبين</p>
                    </div>
                    <div><input type="text" id="userName" placeholder="الاسم الكامل" style="text-align:center;"></div>
                    <div><input type="number" id="userAge" placeholder="العمر" style="text-align:center;"></div>
                    <div><input type="tel" id="userPhone" placeholder="رقم الموبايل" style="text-align:center;"></div>
                    <div>
                        <select id="userTennisLevel" style="text-align:center;">
                            <option value="">مستواك في التنس</option>
                            <option value="مبتدئ">مبتدئ</option>
                            <option value="أقل من متوسط">أقل من متوسط</option>
                            <option value="متوسط">متوسط</option>
                            <option value="أعلى من متوسط">أعلى من متوسط</option>
                            <option value="محترف">محترف</option>
                        </select>
                    </div>
                    <button id="registerBtn" class="btn-primary">✨ بدء الرحلة ✨</button>
                    <p style="text-align:center; color:#777; font-size:12px; margin-top:16px;">بالضغط على البدء، أنت توافق على شروط الاستخدام</p>
                </div>
            </div>
        `;
        document.getElementById("registerBtn").addEventListener("click", async () => {
            const name = document.getElementById("userName").value.trim();
            const age = document.getElementById("userAge").value.trim();
            const phone = document.getElementById("userPhone").value.trim();
            const tennisLevel = document.getElementById("userTennisLevel").value;
            if (!name || !age || !phone || !tennisLevel) return alert("❌ الرجاء ملء جميع الحقول (بما فيها مستواك في التنس)");
            if (isNaN(age) || age < 1) return alert("❌ عمر غير صحيح");
            const newUserRef = push(ref(db, "users"));
            currentUserId = newUserRef.key;
            currentUser = {
                id: currentUserId,
                name,
                age,
                phone,
                tennisLevel,
                registeredAt: new Date().toISOString()
            };
            await set(newUserRef, currentUser);
            localStorage.setItem('tennisApp_userId', currentUserId);
            localStorage.setItem('tennisApp_user', JSON.stringify(currentUser));
            showMainApp();
        });
    }

    function showMainApp() {
        if (!currentUser) return;
        currentUserId = currentUser.id;
        showTabBar();
        loadUnreadNotificationsCount();
        loadUnreadMessagesCount();
        renderCurrentTab();
    }

    function renderCurrentTab() {
        if (activeTab === "home") renderHomeTab();
        else if (activeTab === "chats") { renderChatsTab(); setTimeout(() => loadUnreadMessagesCount(), 500); }
        else if (activeTab === "notifications") { renderNotificationsTab(); markAllNotificationsAsRead(); }
        else if (activeTab === "profile") renderProfileTab();
   
        document.querySelectorAll('.tab-item').forEach(btn => {
            if (btn.dataset.tab === activeTab) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // ✨ دالة جديدة: تحميل وعرض الإعلانات المكتملة ✨
    function loadCompletedAnnouncements() {
        if (!currentUserId) return;
        if (completedAnnouncementsListener) completedAnnouncementsListener();
        
        completedAnnouncementsListener = onValue(ref(db, "completedPosts"), (snapshot) => {
            const completed = snapshot.val() || {};
            const container = document.getElementById("completedAnnouncementsContainer");
            
            // فلترة الإعلانات التي تخص المستخدم الحالي
            const userCompleted = Object.entries(completed)
                .filter(([id, data]) => {
                    // تظهر لصاحب المنشور أو للاعبين الذين تمت الموافقة عليهم
                    if (data.publisherId === currentUserId) return true;
                    if (data.approvedPlayers && data.approvedPlayers.includes(currentUserId)) return true;
                    return false;
                })
                .filter(([id, data]) => {
                    // إخفاء الإعلانات القديمة (أكثر من 24 ساعة)
                    const completedAt = data.completedAt || data.timestamp;
                    return Date.now() - completedAt < 24 * 60 * 60 * 1000;
                })
                .reverse();
            
            if (userCompleted.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            let html = '';
            userCompleted.forEach(([id, post]) => {
                const eventDate = new Date(post.eventTimestamp);
                const formattedEvent = `${eventDate.toLocaleDateString('ar-EG', {weekday:'short', day:'numeric', month:'long', year:'numeric'})} - ${eventDate.toLocaleTimeString('ar-EG', {hour:'numeric', minute:'2-digit'})}`;
                
                // تجهيز صور اللاعبين
                const approvedNames = post.approvedNames || [];
                const avatarsHtml = approvedNames.slice(0, 4).map((name, i) => {
                    const initial = name.charAt(0);
                    return `<div class="player-avatar" title="${escapeHtml(name)}">${initial}</div>`;
                }).join('');
                const extraCount = approvedNames.length - 4;
                const extraHtml = extraCount > 0 ? `<div class="player-avatar plus">+${extraCount}</div>` : '';
                
                html += `
                    <div class="completed-announcement" data-post-id="${id}">
                        <div class="completed-header">
                            <div class="completed-title">فريق مكتمل! 🎾</div>
                            <div class="completed-badge">✅ جاهز للعب</div>
                        </div>
                        <div class="completed-details">
                            <div class="detail-item"><strong>🏟️ النادي:</strong> ${escapeHtml(post.clubName)}</div>
                            <div class="detail-item"><strong>📍 الموقع:</strong> ${escapeHtml(post.location || 'غير محدد')}</div>
                            <div class="detail-item"><strong>🕐 الموعد:</strong> ${formattedEvent}</div>
                            <div class="detail-item"><strong>👥 الفريق:</strong> ${approvedNames.length}/${post.neededPlayers} لاعب</div>
                            <div class="detail-item"><strong>🎯 المستوى:</strong> ${escapeHtml(post.preferredLevel || 'غير محدد')}</div>
                        </div>
                        <div class="players-avatars">
                            ${avatarsHtml}${extraHtml}
                        </div>
                        <div class="completed-actions">
                            <button class="chat-team-btn" data-chat-id="${post.teamChatId}">
                                💬 دردشة الفريق
                            </button>
                            <button class="view-details-btn" data-post-id="${id}">
                                📋 عرض التفاصيل
                            </button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            
            // ربط أزرار الدردشة
            document.querySelectorAll('.chat-team-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const chatId = e.currentTarget.dataset.chatId;
                    if (chatId) {
                        window.switchToTabAndOpenChat('chats', chatId);
                    } else {
                        showToast("⚠️ لم يتم إنشاء دردشة الفريق بعد");
                    }
                });
            });
            
            // ربط أزرار عرض التفاصيل
            document.querySelectorAll('.view-details-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const postId = e.currentTarget.dataset.postId;
                    showCompletedPostDetails(postId);
                });
            });
        });
    }

    function loadAllPostsForHome() {
        onValue(ref(db, "allPosts"), (snapshot) => {
            const posts = snapshot.val() || {};
            let postsArray = Object.entries(posts)
                .map(([id, data]) => ({ id, ...data }))
                .filter(post => !post.completed && post.eventTimestamp && post.eventTimestamp > Date.now())
                .reverse();
        
            let html = '';
            if (postsArray.length === 0) {
                html = `<div class="empty-state">🎾 لا توجد مباريات حالياً<br><span>✏️ أضف موعداً جديداً للعب!</span></div>`;
            } else {
                postsArray.forEach(post => {
                    const eventDate = new Date(post.eventTimestamp);
                    const formattedEvent = `${eventDate.toLocaleDateString('ar-EG', {weekday:'short', day:'numeric', month:'long', year:'numeric'})} - ${eventDate.toLocaleTimeString('ar-EG', {hour:'numeric', minute:'2-digit'})}`;
                  
                    html += `<div class="post-card" id="post-${post.id}">
                        <div class="post-header">
                            <span class="club-name">🎾 ${escapeHtml(post.clubName)}</span>
                            <span class="post-time">${formattedEvent}</span>
                        </div>
                        <div class="post-detail">🕐 ${escapeHtml(post.time)}</div>
                        <div class="post-detail">📍 ${escapeHtml(post.location || 'غير محدد')}</div>
                        <div class="post-detail">👥 يحتاج ${post.neededPlayers || 'غير محدد'} لاعب • المستوى: ${escapeHtml(post.preferredLevel || 'غير محدد')}</div>
                        <div class="post-detail">👤 الناشر: ${escapeHtml(post.publisherName)}</div>
                      
                        <div class="countdown-section" data-event-timestamp="${post.eventTimestamp}">
                            ⏳ فاضل <span class="time-remaining"></span> • 👥 باقي ${Math.max(0, (post.neededPlayers || 9999) - 0)} مكان
                        </div>
                      
                        <div class="ready-section"></div>
                    </div>`;
                });
            }
            document.getElementById("postsList").innerHTML = html;
        
            postsArray.forEach(post => {
                const isOwner = post.publisherId === currentUserId;
                const readyRef = ref(db, `postReady/${post.id}`);
                onValue(readyRef, (readySnap) => {
                    const readyUsers = readySnap.val() || {};
                    const approvedCount = Object.values(readyUsers).filter(u => u.status === 'approved').length;
                    const needed = post.neededPlayers || 9999;
                    const remaining = Math.max(0, needed - approvedCount);
                    const isUserReady = readyUsers[currentUserId] !== undefined;
                    const isUserApproved = readyUsers[currentUserId]?.status === 'approved';
                    const postElement = document.getElementById(`post-${post.id}`);
                    if (!postElement) return;
                    const readyDiv = postElement.querySelector('.ready-section');
                    if (!readyDiv) return;
                    const countdownSection = postElement.querySelector('.countdown-section');
                    if (countdownSection) {
                        countdownSection.innerHTML = `
                            ⏳ فاضل <span class="time-remaining"></span> • 👥 باقي ${remaining} مكان
                        `;
                    }
                    if (isOwner) {
                        let usersHtml = '';
                        Object.entries(readyUsers).forEach(([userId, userData]) => {
                            if (userData.status === 'waiting') {
                                usersHtml += `
                                    <div class="ready-user-item">
                                        <span>🎾 ${escapeHtml(userData.name)}</span>
                                        <div>
                                            <button class="approve-btn" data-userid="${userId}" data-username="${escapeHtml(userData.name)}" data-postid="${post.id}" data-postclub="${escapeHtml(post.clubName)}" data-posttime="${escapeHtml(post.time)}">✅ أوافق</button>
                                            <button class="reject-btn" data-userid="${userId}" data-postid="${post.id}">❌ رفض</button>
                                        </div>
                                    </div>
                                `;
                            }
                        });
                        const countHtml = `<div class="ready-count-badge">👥 ${approvedCount} موافق / ${needed === 9999 ? '∞' : needed} • ${Object.keys(readyUsers).length} طلب</div>`;
                        readyDiv.innerHTML = `${countHtml}${usersHtml ? `<div class="ready-users-list">${usersHtml}</div>` : '<div class="ready-users-list" style="color:#777; text-align:center; padding:12px;">لا يوجد طلبات انتظار</div>'}`;
                    
                        readyDiv.querySelectorAll('.approve-btn').forEach(btn => {
                            btn.addEventListener('click', () => approveUser(btn.dataset.userid, btn.dataset.username, btn.dataset.postid, btn.dataset.postclub, btn.dataset.posttime));
                        });
                        readyDiv.querySelectorAll('.reject-btn').forEach(btn => {
                            btn.addEventListener('click', () => rejectUser(btn.dataset.userid, btn.dataset.postid));
                        });
                    } else {
                        let readyContent = `<div class="ready-count-badge">👥 تمت الموافقة: ${approvedCount}/${needed === 9999 ? '∞' : needed} • باقي ${remaining} مكان</div>`;
                    
                        if (isUserApproved) {
                            const chatId = [currentUserId, post.publisherId].sort().join('_');
                            readyContent += `
                                <div style="margin-top:8px; padding:12px; background:linear-gradient(135deg,#64dcb4,#4dd0c0); color:#0a1a15; border-radius:22px; text-align:center; font-weight:700;">✅ تمت الموافقة عليك!</div>
                                <button class="approved-badge" onclick="window.switchToTabAndOpenChat('chats', '${chatId}')">💬 ابدأ الدردشة</button>
                                <button class="cancel-ready-btn" data-postid="${post.id}" style="margin-top:8px;">❌ سحب طلبي</button>
                            `;
                        } else if (isUserReady) {
                            readyContent += `
                                <button class="cancel-ready-btn" data-postid="${post.id}">❌ سحب طلبي</button>
                                <div class="waiting-badge" style="text-align:center; margin-top:10px;">⏳ في انتظار موافقة الناشر</div>
                            `;
                        } else {
                            if (remaining > 0) {
                                readyContent += `<button class="ready-btn-new"
                                    data-post-id="${post.id}"
                                    data-post-club="${escapeHtml(post.clubName)}"
                                    data-post-time="${escapeHtml(post.time)}"
                                    data-post-publisher="${escapeHtml(post.publisherName)}"
                                    data-post-publisherid="${post.publisherId}"
                                    data-post-preferredlevel="${escapeHtml(post.preferredLevel || '')}">
                                    🎾 أنا جاهز للعب 🎾
                                </button>`;
                            } else {
                                readyContent += `<div class="waiting-badge" style="text-align:center; padding:14px; font-size:14px;">🎉 اكتمل التيم! لا يوجد أماكن متبقية</div>`;
                            }
                        }
                    
                        readyDiv.innerHTML = readyContent;
                    
                        const readyBtn = readyDiv.querySelector('.ready-btn-new');
                        if (readyBtn) {
                            readyBtn.addEventListener('click', (e) => {
                                const preferredLevel = e.currentTarget.dataset.postPreferredlevel || '';
                                handleReadyClick(e, post.id, post.clubName, post.time, post.publisherName, post.publisherId, preferredLevel);
                            });
                        }
                        const cancelBtn = readyDiv.querySelector('.cancel-ready-btn');
                        if (cancelBtn) {
                            cancelBtn.addEventListener('click', () => cancelReady(post.id));
                        }
                    }
                    setTimeout(updateAllCountdowns, 100);
                });
            });
        });
    }

    async function handleReadyClick(e, postId, clubName, eventTime, publisherName, publisherId, preferredLevel = '') {
        if (publisherId === currentUserId) {
            showToast("لا يمكنك التجهيز على منشورك");
            return;
        }
        const userLevelVal = getLevelValue(currentUser.tennisLevel);
        const requiredLevelVal = getLevelValue(preferredLevel);
        if (requiredLevelVal > 0 && userLevelVal < requiredLevelVal) {
            showToast(`ناسف لذلك مستواك أقل من المطلوب (${preferredLevel})`);
            return;
        }
        await set(ref(db, `postReady/${postId}/${currentUserId}`), { name: currentUser.name, userId: currentUserId, status: 'waiting', timestamp: Date.now() });
        await push(ref(db, `notifications/${publisherId}`), { type: 'new_ready', fromName: currentUser.name, fromId: currentUserId, clubName: clubName, postId: postId, message: `🔔 ${currentUser.name} جاهز للعب معك في ${clubName}`, timestamp: Date.now(), read: false });
        showToast(`✅ تم إرسال طلبك إلى ${publisherName}`);
    }

    async function cancelReady(postId) {
        await remove(ref(db, `postReady/${postId}/${currentUserId}`));
    
        try {
            const postSnap = await get(ref(db, `allPosts/${postId}`));
            if (postSnap.exists()) {
                const post = postSnap.val();
                const publisherId = post.publisherId;
                await push(ref(db, `notifications/${publisherId}`), {
                    type: 'withdraw',
                    fromName: currentUser.name,
                    message: `😔 ${currentUser.name} سحب طلبه من منشور ${post.clubName}`,
                    timestamp: Date.now(),
                    read: false
                });
                if (post.completed) {
                    const readySnap = await get(ref(db, `postReady/${postId}`));
                    const rUsers = readySnap.val() || {};
                    const approvedC = Object.values(rUsers).filter(u => u.status === 'approved').length;
                    const needed = post.neededPlayers || 9999;
                    if (approvedC < needed) {
                        await update(ref(db, `allPosts/${postId}`), { completed: false });
                        showToast("✅ تم إعادة المنشور لأن التيم لم يكتمل بعد");
                    }
                }
            }
        } catch(e) {}
    
        showToast("❌ تم سحب طلبك");
    }

    async function approveUser(userId, userName, postId, clubName, eventTime) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-content"><h3 style="color:#64dcb4; margin-bottom:18px; text-align:center;">✉️ إرسال رسالة للشريك</h3><div class="message-preview"><p style="color:#64dcb4; margin-bottom:10px; font-weight:600;">📝 الرسالة جاهزة للإرسال:</p><p style="background:rgba(15,25,22,0.8); padding:14px; border-radius:14px; line-height:1.5;">🎉 أهلاً ${escapeHtml(userName)}!<br>✅ الموعد تمام بالنسبة لي<br>🤝 نتقابل في ${escapeHtml(clubName)} إن شاء الله</p></div><div style="display:flex; gap:14px; margin-top:20px;"><button id="cancelSendBtn" class="btn-outline" style="flex:1;">إلغاء</button><button id="confirmSendBtn" class="btn-primary" style="flex:1;">📤 إرسال الرسالة</button></div></div>`;
        document.body.appendChild(modal);
    
        document.getElementById("cancelSendBtn").addEventListener("click", () => modal.remove());
        document.getElementById("confirmSendBtn").addEventListener("click", async () => {
            modal.remove();
        
            await update(ref(db), { [`postReady/${postId}/${userId}/status`]: 'approved' });
        
            const chatId = [currentUserId, userId].sort().join('_');
            await set(ref(db, `chats/${chatId}`), { participants: [currentUserId, userId], participantNames: { [currentUserId]: currentUser.name, [userId]: userName }, createdAt: Date.now(), clubName: clubName, postId: postId, eventTime: eventTime });
            await set(ref(db, `userChats/${currentUserId}/${chatId}`), { chatId, otherId: userId, otherName: userName, clubName: clubName, lastUpdated: Date.now(), lastRead: Date.now() });
            await set(ref(db, `userChats/${userId}/${chatId}`), { chatId, otherId: currentUserId, otherName: currentUser.name, clubName: clubName, lastUpdated: Date.now(), lastRead: 0 });
            const msgRef = push(ref(db, `chats/${chatId}/messages`));
            await set(msgRef, { senderId: currentUserId, senderName: currentUser.name, text: `🎉 أهلاً ${userName}!\n✅ الموعد تمام بالنسبة لي\n🤝 نتقابل في ${clubName} إن شاء الله`, timestamp: Date.now() });
            await push(ref(db, `notifications/${userId}`), { type: 'approved', fromName: currentUser.name, chatId: chatId, message: `🎉 ${currentUser.name} وافق على طلبك! اذهب للدردشة الآن`, timestamp: Date.now(), read: false });
        
            // ✨ تحديث: عند اكتمال الفريق، إنشاء إعلان مكتمل ✨
            const readySnap = await get(ref(db, `postReady/${postId}`));
            const rUsers = readySnap.val() || {};
            const approvedUsers = Object.values(rUsers).filter(u => u.status === 'approved');
            const approvedCount = approvedUsers.length;
            const postSnap = await get(ref(db, `allPosts/${postId}`));
            if (postSnap.exists()) {
                const post = postSnap.val();
                const needed = post.neededPlayers || 9999;
                if (approvedCount >= needed) {
                    // إنشاء دردشة جماعية للفريق
                    const teamChatId = `team_${postId}`;
                    const approvedNames = approvedUsers.map(u => u.name);
                    const allParticipants = [post.publisherId, ...approvedUsers.map(u => u.userId)];
                    
                    // حفظ المنشور المكتمل في قسم الإعلانات
                    await set(ref(db, `completedPosts/${postId}`), {
                        ...post,
                        completedAt: Date.now(),
                        approvedPlayers: approvedUsers.map(u => u.userId),
                        approvedNames: approvedNames,
                        teamChatId: teamChatId
                    });
                    
                    // إنشاء دردشة الفريق
                    await set(ref(db, `chats/${teamChatId}`), {
                        participants: allParticipants,
                        participantNames: {
                            [post.publisherId]: post.publisherName,
                            ...Object.fromEntries(approvedUsers.map(u => [u.userId, u.name]))
                        },
                        createdAt: Date.now(),
                        clubName: post.clubName,
                        postId: postId,
                        eventTime: post.time,
                        isTeamChat: true
                    });
                    
                    // إضافة الدردشة لكل مشارك
                    for (const participantId of allParticipants) {
                        await set(ref(db, `userChats/${participantId}/${teamChatId}`), {
                            chatId: teamChatId,
                            otherName: "فريق التنس",
                            clubName: post.clubName,
                            lastUpdated: Date.now(),
                            lastRead: Date.now(),
                            isTeamChat: true
                        });
                    }
                    
                    // إرسال رسالة ترحيبية في دردشة الفريق
                    const welcomeMsg = `🎉 أهلاً بالفريق! 🎾\nالموعد: ${post.time}\nالمكان: ${post.location || post.clubName}\nلنلعب مباراة رائعة! 💪`;
                    const welcomeRef = push(ref(db, `chats/${teamChatId}/messages`));
                    await set(welcomeRef, {
                        senderId: 'system',
                        senderName: 'النظام',
                        text: welcomeMsg,
                        timestamp: Date.now(),
                        isSystem: true
                    });
                    
                    // إشعار لجميع أعضاء الفريق
                    for (const participantId of allParticipants) {
                        await push(ref(db, `notifications/${participantId}`), {
                            type: 'team_complete',
                            message: `🎉 اكتمل فريق ${post.clubName}! الموعد: ${post.time}`,
                            chatId: teamChatId,
                            timestamp: Date.now(),
                            read: false
                        });
                    }
                    
                    // تحديث المنشور الأصلي
                    await update(ref(db, `allPosts/${postId}`), { 
                        completed: true, 
                        completedAt: Date.now(),
                        teamChatId: teamChatId
                    });
                    
                    showToast("🎉 تم اكتمال التيم! ظهر الإعلان في أعلى الصفحة");
                }
            }
        
            showToast(`✅ تمت الموافقة على ${userName} وتم إرسال الرسالة`);
            setTimeout(() => window.openChat(chatId), 500);
        });
    }

                    const lastRead = lastReadSnap.val() || 0;
                    const messagesSnap = await get(ref(db, `chats/${entry.chatId}/messages`));
                    const messages = messagesSnap.val() || {};
                    let hasUnread = false;
                    Object.values(messages).forEach(msg => { if (msg.senderId !== currentUserId && msg.timestamp > lastRead) hasUnread = true; });
                    return { ...entry, hasUnread };
                }));
                html = entriesWithUnread.map(entry => `
                    <div class="select-item" data-chatid="${entry.chatId}" onclick="if(!${isSelectionMode}) window.openChatAndUpdateRead('${entry.chatId}')">

                });

    window.openChat = async function(chatId) {
        await updateLastRead(chatId);
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.innerHTML = `<div class="modal-content chat-modal-content"><div style="display:flex; justify-content:space-between; margin-bottom:12px; align-items:center;"><h3 id="chatTitle" style="color:#64dcb4; display:flex; align-items:center; gap:8px; font-size:18px;">💬 دردشة</h3><button onclick="this.closest('.modal').remove()" style="background:none; border:none; font-size:30px; color:#ff6b6b; cursor:pointer; transition:transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">✕</button></div><div id="chatMessages" class="messages-container"></div><div style="display:flex; gap:10px; margin-top:12px;"><input id="msgInput" type="text" placeholder="اكتب رسالة..." style="flex:1; margin-bottom:0;"><button id="sendMsgBtn" style="background:linear-gradient(135deg, #64dcb4, #4dd0c0); border:none; padding:14px 26px; border-radius:32px; color:#0a1a15; font-weight:700; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 16px rgba(100,220,180,0.35);" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">إرسال</button></div></div>`;
        document.body.appendChild(modal);
        const chatSnap = await get(ref(db, `chats/${chatId}`));
        if (chatSnap.exists()) {
            const chat = chatSnap.val();
            const other = Object.entries(chat.participantNames).find(([id]) => id !== currentUserId);
            document.getElementById("chatTitle").textContent = `💬 مع ${escapeHtml(other ? other[1] : 'اللاعب')}`;
        }
        const messagesRef = ref(db, `chats/${chatId}/messages`);
        onValue(messagesRef, (snapshot) => {
            const msgs = snapshot.val() || {};
            let html = '';
            Object.entries(msgs).sort(([,a], [,b]) => a.timestamp - b.timestamp).forEach(([, msg]) => {
                const isMine = msg.senderId === currentUserId;
                const messageClass = isMine ? 'my-message' : 'other-message';
                const systemClass = msg.isSystem ? 'style="background:linear-gradient(135deg, #b478ff, #64dcb4); color:#0a1a15; text-align:center; font-weight:600; border:none; max-width:95%; align-self:center;"' : '';
                html += `<div class="message ${messageClass}" ${systemClass}><small style="opacity:0.8; font-size:11px; display:block; margin-bottom:3px;">${escapeHtml(msg.senderName)}</small>${escapeHtml(msg.text)}<div style="font-size:9px; margin-top:5px; opacity:0.5; text-align:right;">${new Date(msg.timestamp).toLocaleTimeString('ar-EG')}</div></div>`;
            });
            const container = document.getElementById("chatMessages");
            if (container) {
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            }
        });
        document.getElementById("sendMsgBtn").addEventListener("click", async () => {
            const text = document.getElementById("msgInput").value.trim();
            if (!text) return;
            const msgRef = push(ref(db, `chats/${chatId}/messages`));
            await set(msgRef, { senderId: currentUserId, senderName: currentUser.name, text, timestamp: Date.now() });
            await set(ref(db, `userChats/${currentUserId}/${chatId}/lastUpdated`), Date.now());
            document.getElementById("msgInput").value = "";
            document.getElementById("msgInput").focus();
        });
        document.getElementById("msgInput").addEventListener("keypress", (e) => { if (e.key === "Enter") document.getElementById("sendMsgBtn").click(); });
        document.getElementById("msgInput").focus();
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
    };

                <select id="preferredLevel" style="background: rgba(30,30,50,0.8); border:1.5px solid rgba(100,220,180,0.25); padding:14px 18px; border-radius:24px; color:white; width:100%; margin-bottom:14px;">

                </div>
            </div>`;
        document.body.appendChild(modal);
    
        document.getElementById("cancelModal").addEventListener("click", () => modal.remove());
        document.getElementById("publishPost").addEventListener("click", async () => {
            const clubName = document.getElementById("clubName").value.trim();
            const location = document.getElementById("location").value.trim();
            const eventDate = document.getElementById("eventDate").value;
            const eventTimeInput = document.getElementById("eventTimeInput").value;
            const neededPlayers = parseInt(document.getElementById("neededPlayers").value);
            const preferredLevel = document.getElementById("preferredLevel").value;

            const eventDateTime = `${eventDate}T${eventTimeInput}:00`;
            const eventTimestamp = new Date(eventDateTime).getTime();
        
            if (isNaN(eventTimestamp) || eventTimestamp < Date.now() + 7200000) {
                return alert("⚠️ يجب أن يكون الموعد بعد ساعتين على الأقل من الآن");
            }
        
            const displayTime = new Date(eventTimestamp).toLocaleString('ar-EG', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit'
            });
        
            await push(ref(db, "allPosts"), {
                clubName,
                location,
                time: displayTime,
                eventTimestamp,
                neededPlayers,
                preferredLevel,
                publisherName: currentUser.name,
                publisherPhone: currentUser.phone,
                publisherId: currentUserId,
                timestamp: Date.now(),
                completed: false
            });
        
            modal.remove();
            showToast("✅ تم النشر بنجاح! 🎾 انتظر من يجهز عليك");
            if (activeTab === "home") renderHomeTab();
        });
        document.getElementById("clubName").focus();
    }

    function logout() {
        localStorage.clear();
        currentUser = null;
        currentUserId = null;
        if (notificationListener) notificationListener();
        if (chatsListener) chatsListener();
        if (completedAnnouncementsListener) completedAnnouncementsListener();
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = null;
        completedAnnouncementsListener = null;
        showRegisterCard();
    }

    function bindTabs() {
        document.querySelectorAll('.tab-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                activeTab = btn.dataset.tab;
                renderCurrentTab();
            });
        });
    }

    async function initApp() {
        currentUserId = localStorage.getItem('tennisApp_userId');
        if (currentUserId) {
            const snap = await get(child(ref(db, "users"), currentUserId));
            if (snap.exists()) {
                currentUser = snap.val();
                showMainApp();
                bindTabs();
                return;
            }
        }
        showRegisterCard();
        bindTabs();
    }

    initApp();
</script>
</body>
</html>
